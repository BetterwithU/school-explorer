<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조별 순서표</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #e94560;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #a8dadc;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .group-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .group-card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
    }

    .group-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-color {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .order-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .order-item {
      background: #0f3460;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .order-step {
      background: #e94560;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .print-btn {
      display: block;
      max-width: 600px;
      margin: 24px auto 0;
      background: #0f3460;
      color: #a8dadc;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }

    .print-btn:hover { background: #16213e; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #a8dadc;
      text-decoration: none;
      font-size: 0.9rem;
    }

    @media print {
      body { background: #fff; color: #000; }
      .group-card { background: #f5f5f5; border: 1px solid #ddd; }
      .order-item { background: #e0e0e0; }
      .order-step { background: #e94560; }
      .print-btn, .back-link { display: none; }
    }
  </style>
</head>
<body>
  <h1>📋 조별 순서표</h1>
  <p class="subtitle">각 조는 아래 순서대로 QR코드를 찾아다니세요!</p>

  <div class="group-cards" id="groups"></div>

  <button class="print-btn" onclick="window.print()">🖨️ 순서표 인쇄하기</button>
  <a href="index.html" class="back-link">← 메인으로 돌아가기</a>

  <script>
    const TOTAL_QUESTIONS = 9;
    const TOTAL_GROUPS = 6;
    const GROUP_COLORS = ['#e94560', '#f4a261', '#2ec4b6', '#a8dadc', '#b7e4c7', '#ffb3c1'];
    const GROUP_NAMES = ['1조', '2조', '3조', '4조', '5조', '6조'];

    function generateSchedule(numGroups, numQuestions) {
      const base = Array.from({ length: numQuestions }, (_, i) => i + 1);
      const schedules = [];
      for (let g = 0; g < numGroups; g++) {
        const offset = Math.floor((g * numQuestions) / numGroups);
        const order = [...base.slice(offset), ...base.slice(0, offset)];
        schedules.push(order);
      }
      return schedules;
    }

    const schedules = generateSchedule(TOTAL_GROUPS, TOTAL_QUESTIONS);
    const container = document.getElementById('groups');

    schedules.forEach((order, i) => {
      const items = order.map((qNum, step) => `
        <div class="order-item">
          <span class="order-step">${step + 1}</span>
          Q${qNum}
        </div>
      `).join('');

      container.innerHTML += `
        <div class="group-card">
          <div class="group-title">
            <span class="group-color" style="background:${GROUP_COLORS[i]}"></span>
            ${GROUP_NAMES[i]}
          </div>
          <div class="order-list">${items}</div>
        </div>
      `;
    });
  </script>
</body>
</html>
