<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조별 순서표</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #e94560;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #a8dadc;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .group-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .group-card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
    }

    .group-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-color {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .order-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .order-item {
      background: #0f3460;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .order-step {
      background: #e94560;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .print-btn {
      display: block;
      max-width: 600px;
      margin: 24px auto 0;
      background: #0f3460;
      color: #a8dadc;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }

    .print-btn:hover { background: #16213e; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #a8dadc;
      text-decoration: none;
      font-size: 0.9rem;
    }

    @media print {
      body { background: #fff; color: #000; }
      .group-card { background: #f5f5f5; border: 1px solid #ddd; }
      .order-item { background: #e0e0e0; }
      .order-step { background: #e94560; }
      .print-btn, .back-link { display: none; }
    }
  </style>
</head>
<body>
  <h1>📋 조별 순서표 <span style="font-size:0.8rem;color:#a8dadc">(선생님용)</span></h1>
  <p class="subtitle">각 조의 이동 순서입니다. 학생에겐 첫 장소만 알려주면 앱이 다음을 안내해요.</p>

  <div class="group-cards" id="groups"></div>

  <button class="print-btn" onclick="window.print()">🖨️ 순서표 인쇄하기</button>
  <a href="hq.html" class="back-link">← 대시보드로 돌아가기</a>

  <script src="app.js"></script>
  <script>
    const GROUP_COLORS = ['#e94560', '#f4a261', '#2ec4b6', '#a8dadc', '#b7e4c7', '#ffb3c1'];

    loadData().then(({ course }) => {
      const container = document.getElementById('groups');
      const placeName = s => (course.missions.find(m => m.set === s) || {}).placeName || ('세트' + s);

      course.teams.forEach((team, i) => {
        // 앱과 동일한 결정적 셔플(세트 단위) → 실제 학생이 보는 순서와 일치
        const order = teamMissionOrder(course, team);
        const items = order.map((setNo, step) => `
          <div class="order-item">
            <span class="order-step">${step + 1}</span>
            ${placeName(setNo)}
          </div>
        `).join('');

        container.innerHTML += `
          <div class="group-card">
            <div class="group-title">
              <span class="group-color" style="background:${GROUP_COLORS[i % GROUP_COLORS.length]}"></span>
              ${team}
            </div>
            <div class="order-list">${items}</div>
          </div>
        `;
      });
    });
  </script>

  <!-- 제목 7번 연속 클릭 → 개발자 콘솔(새 창) -->
  <script>
    document.addEventListener('click', (e) => {
      const h = e.target.closest('h1');
      if (!h) return;
      window._devN = (window._devN || 0) + 1;
      clearTimeout(window._devT);
      window._devT = setTimeout(() => { window._devN = 0; }, 1500);
      if (window._devN >= 7) { window._devN = 0; window.open('dev.html', '_blank'); }
    });
  </script>
</body>
</html>
