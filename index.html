<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>학교 캠핑 탐험대</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #2c1f0e;
      color: #2c1a05;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(210,175,110,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(180,140,80,0.2) 0%, transparent 60%),
        linear-gradient(160deg, #e8d5a3 0%, #dcc48a 40%, #d4b870 100%);
      z-index: -1;
    }

    /* 별 배경 */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--o, 0.8); }
    }

    /* 캠프파이어 불꽃 */
    .fire-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 8px;
    }
    .fire-emoji {
      font-size: 4rem;
      display: inline-block;
      animation: fire-sway 1.2s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 16px rgba(255,160,50,0.8));
    }
    @keyframes fire-sway {
      from { transform: scale(1) rotate(-3deg); }
      to   { transform: scale(1.08) rotate(3deg); }
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 2rem;
      color: #5c2e05;
      margin-bottom: 6px;
      text-shadow: 1px 1px 0 rgba(255,240,200,0.5);
    }
    header p {
      color: rgba(60,30,5,0.7);
      font-size: 0.95rem;
    }

    .panel {
      position: relative;
      z-index: 1;
      background: rgba(245,235,200,0.82);
      border: 2px solid rgba(100,65,20,0.4);
      border-radius: 6px;
      padding: 28px 22px;
      max-width: 420px;
      width: 100%;
      box-shadow: 3px 4px 18px rgba(60,30,5,0.25);
    }

    .panel h2 {
      font-size: 1rem;
      color: #7a3a10;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 1px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .team-btn {
      background: rgba(100,65,20,0.1);
      border: 1px solid rgba(100,65,20,0.4);
      color: #5c2e05;
      padding: 18px 12px;
      border-radius: 4px;
      font-size: 1.15rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .team-btn:active { transform: scale(0.96); background: rgba(100,65,20,0.18); }
    @media (hover: hover) {
      .team-btn:hover {
        background: rgba(100,65,20,0.18);
        transform: translateY(-2px);
      }
    }

    .resume-box {
      background: rgba(100,65,20,0.08);
      border: 1px solid rgba(100,65,20,0.3);
      border-radius: 6px;
      padding: 22px;
      margin-bottom: 18px;
      text-align: center;
    }
    .resume-box .label {
      font-size: 0.78rem;
      color: rgba(80,50,15,0.65);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .resume-box .team-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #5c2e05;
      margin-bottom: 6px;
    }
    .resume-box .progress {
      font-size: 0.9rem;
      color: rgba(60,30,5,0.7);
      margin-bottom: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.15s, background 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b4513 0%, #6b3410 100%);
      color: #f5deb3;
      margin-bottom: 10px;
      box-shadow: 2px 3px 8px rgba(60,30,5,0.3);
      border-radius: 4px;
    }
    .btn-primary:active { transform: scale(0.97); }
    @media (hover: hover) { .btn-primary:hover { background: linear-gradient(135deg, #a0521a 0%, #7a3d12 100%); } }

    .btn-ghost {
      background: none;
      border: 1px solid rgba(100,65,20,0.35);
      color: rgba(80,50,15,0.7);
      font-size: 0.85rem;
      padding: 10px;
      border-radius: 4px;
    }
    .btn-ghost:active { background: rgba(100,65,20,0.1); }
    @media (hover: hover) { .btn-ghost:hover { background: rgba(100,65,20,0.1); } }

    .next-place {
      margin-top: 20px;
      background: rgba(100,65,20,0.08);
      border: 1px solid rgba(130,80,20,0.5);
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      display: none;
      animation: fade-in 0.3s ease;
    }
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .next-place .ico { font-size: 2rem; margin-bottom: 6px; }
    .next-place .ttl { color: rgba(80,50,15,0.65); font-size: 0.82rem; margin-bottom: 4px; letter-spacing: 1px; }
    .next-place .nm  { font-size: 1.5rem; font-weight: bold; color: #5c2e05; margin-bottom: 8px; }
    .next-place .hint { color: rgba(60,30,5,0.65); font-size: 0.82rem; line-height: 1.6; margin-bottom: 14px; }
  </style>
</head>
<body>

  <header>
    <h1>🗺️ 캠핑 탐험대</h1>
    <p id="subtitle">QR을 찾아다니며 미션을 해결하세요!</p>
  </header>

  <div class="panel" id="panel">
    <p style="text-align:center;color:rgba(100,65,20,0.5)">불러오는 중...</p>
  </div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script type="module" src="sync.js"></script>
  <script>
    let COURSE = null;

    loadData().then(({ course }) => {
      COURSE = course;
      document.getElementById('subtitle').textContent = course.subtitle || '';
      render();
    });

    function render() {
      const panel = document.getElementById('panel');
      const p = loadProgress();

      if (p && p.team) {
        const total = p.order.length;
        const done = p.step;
        const finished = isAllDone(p);
        panel.innerHTML = `
          <div class="resume-box">
            <div class="label">🏕️ 진행 중인 조</div>
            <div class="team-name">${p.team}</div>
            <div class="progress">⭐ 미션 ${done} / ${total} 완료</div>
            <a class="btn btn-primary" href="#" id="resumeBtn">🗺️ 이어서 하기 →</a>
          </div>
          ${finished ? '<button class="btn btn-ghost" id="restartBtn">🔄 새 게임 시작 (다른 조)</button>' : ''}
        `;
        document.getElementById('resumeBtn').onclick = (e) => { e.preventDefault(); goToCurrent(p); };
        const rb = document.getElementById('restartBtn');
        if (rb) rb.onclick = () => {
          if (confirm('이 기기의 진행 기록을 지우고 새로 시작할까요?')) {
            clearProgress();
            render();
          }
        };
        return;
      }

      const teams = COURSE.teams.map(t =>
        `<button class="team-btn" data-team="${t}">${t}</button>`
      ).join('');
      panel.innerHTML = `
        <h2>🏕️ 우리 조를 선택하세요</h2>
        <div class="team-grid">${teams}</div>
        <div class="next-place" id="nextPlace">
          <div class="ico">📍</div>
          <div class="ttl">첫 번째 미션 장소</div>
          <div class="nm" id="placeName"></div>
          <div class="hint">이곳에서 두 명이 QR코드(A·B)를 나눠 스캔하세요!</div>
          <a class="btn btn-primary" href="#" id="startBtn">🚀 탐험 시작! →</a>
        </div>
      `;
      panel.querySelectorAll('.team-btn').forEach(btn => {
        btn.onclick = () => selectTeam(btn.dataset.team, btn);
      });
    }

    function selectTeam(team, btn) {
      document.querySelectorAll('.team-btn').forEach(b => {
        b.style.borderColor = '#2d6a4f';
        b.style.color = '#b7e4c7';
      });
      btn.style.borderColor = '#ffd166';
      btn.style.color = '#ffd166';

      const p = startGame(COURSE, team);
      reportProgress(COURSE, p);
      const mission = missionBySet(COURSE, currentSet(p));

      document.getElementById('placeName').textContent = mission.placeName;
      document.getElementById('nextPlace').style.display = 'block';
      document.getElementById('startBtn').onclick = (e) => { e.preventDefault(); goToCurrent(p); };
    }

    function goToCurrent(p) {
      if (isAllDone(p)) {
        location.href = isFinalePending(COURSE, p) ? 'map.html' : 'done.html';
        return;
      }
      location.href = 'home.html';
    }

    // 🛠️ 히든: 제목을 1.5초 내 7번 탭하면 개발자 콘솔로
    (function () {
      let n = 0, t;
      const h = document.querySelector('header h1');
      if (!h) return;
      h.addEventListener('click', () => {
        n++; clearTimeout(t); t = setTimeout(() => { n = 0; }, 1500);
        if (n >= 7) { n = 0; window.open('dev.html', '_blank'); }
      });
    })();
  </script>
</body>
</html>
