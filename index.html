<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학교 캠핑 탐험대</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 2.1rem;
      color: #e94560;
      margin-bottom: 8px;
    }

    header p {
      color: #a8dadc;
      font-size: 1rem;
    }

    .panel {
      background: #16213e;
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .panel h2 {
      font-size: 1.1rem;
      color: #a8dadc;
      margin-bottom: 16px;
      text-align: center;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .team-btn {
      background: #0f3460;
      border: 2px solid transparent;
      color: #fff;
      padding: 18px;
      border-radius: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    .team-btn:active { background: #1d4e8a; }
    @media (hover: hover) {
      .team-btn:hover { transform: translateY(-3px); background: #1d4e8a; }
    }

    .resume-box {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .resume-box .label {
      font-size: 0.85rem;
      color: #a8dadc;
      margin-bottom: 6px;
    }

    .resume-box .team-name {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffd166;
      margin-bottom: 4px;
    }

    .resume-box .progress {
      font-size: 0.9rem;
      color: #b7e4c7;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      border: none;
      padding: 15px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
    }

    .btn-primary { background: #e94560; color: #fff; margin-bottom: 10px; }
    .btn-primary:active { background: #c73652; }

    .btn-ghost {
      background: none;
      border: 1px solid #0f3460;
      color: #a8dadc;
      font-size: 0.85rem;
      padding: 10px;
    }
    .btn-ghost:active { background: #0f3460; }
    @media (hover: hover) {
      .btn-primary:hover { background: #c73652; }
      .btn-ghost:hover { background: #0f3460; }
    }

    .next-place {
      margin-top: 18px;
      background: #2d6a4f;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      display: none;
    }
    .next-place .ico { font-size: 1.8rem; }
    .next-place .ttl { color: #74c69d; font-size: 0.85rem; margin: 4px 0; }
    .next-place .nm  { font-size: 1.5rem; font-weight: bold; color: #b7e4c7; }
    .next-place .hint { color: #a8dadc; font-size: 0.85rem; margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>🏕️ 캠핑 탐험대</h1>
    <p id="subtitle">QR을 찾아다니며 미션을 해결하세요!</p>
  </header>

  <div class="panel" id="panel">
    <p style="text-align:center;color:#a8dadc">불러오는 중...</p>
  </div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script type="module" src="sync.js"></script>
  <script>
    let COURSE = null;

    loadData().then(({ course }) => {
      COURSE = course;
      document.getElementById('subtitle').textContent = course.subtitle || '';
      render();
    });

    function render() {
      const panel = document.getElementById('panel');
      const p = loadProgress();

      // 진행 중인 게임이 있으면 "이어하기" 우선 노출
      if (p && p.team) {
        const total = p.order.length;
        const done = p.step;
        const finished = isAllDone(p); // 미션 완주 후에만 '새 시작' 허용 (조 고정·기록 보호)
        panel.innerHTML = `
          <div class="resume-box">
            <div class="label">진행 중인 조</div>
            <div class="team-name">${p.team}</div>
            <div class="progress">미션 ${done} / ${total} 완료</div>
            <a class="btn btn-primary" href="#" id="resumeBtn">이어서 하기 →</a>
          </div>
          ${finished ? '<button class="btn btn-ghost" id="restartBtn">새 게임 시작 (다른 조)</button>' : ''}
        `;
        document.getElementById('resumeBtn').onclick = (e) => { e.preventDefault(); goToCurrent(p); };
        const rb = document.getElementById('restartBtn');
        if (rb) rb.onclick = () => {
          if (confirm('이 기기의 진행 기록을 지우고 새로 시작할까요?')) {
            clearProgress();
            render();
          }
        };
        return;
      }

      // 새 시작: 조 선택
      const teams = COURSE.teams.map(t =>
        `<button class="team-btn" data-team="${t}">${t}</button>`
      ).join('');
      panel.innerHTML = `
        <h2>우리 조를 선택하세요</h2>
        <div class="team-grid">${teams}</div>
        <div class="next-place" id="nextPlace">
          <div class="ico">📍</div>
          <div class="ttl">첫 번째 미션 장소</div>
          <div class="nm" id="placeName"></div>
          <div class="hint">이곳에서 두 명이 QR코드(A·B)를 나눠 스캔하세요!</div>
          <a class="btn btn-primary" href="#" id="startBtn" style="margin-top:14px">시작하기 →</a>
        </div>
      `;
      panel.querySelectorAll('.team-btn').forEach(btn => {
        btn.onclick = () => selectTeam(btn.dataset.team, btn);
      });
    }

    function selectTeam(team, btn) {
      document.querySelectorAll('.team-btn').forEach(b => b.style.borderColor = 'transparent');
      btn.style.borderColor = '#e94560';

      const p = startGame(COURSE, team);
      reportProgress(COURSE, p);
      const mission = missionBySet(COURSE, currentSet(p));

      document.getElementById('placeName').textContent = mission.placeName;
      document.getElementById('nextPlace').style.display = 'block';
      document.getElementById('startBtn').onclick = (e) => { e.preventDefault(); goToCurrent(p); };
    }

    // 현재 미션 안내 화면으로(스캔 전 안내)
    function goToCurrent(p) {
      if (isAllDone(p)) {
        location.href = isFinalePending(COURSE, p) ? 'map.html' : 'done.html';
        return;
      }
      location.href = 'mission.html';
    }

    // 🛠️ 히든: 제목을 1.5초 내 7번 탭하면 개발자 콘솔로
    (function () {
      let n = 0, t;
      const h = document.querySelector('header h1');
      if (!h) return;
      h.addEventListener('click', () => {
        n++; clearTimeout(t); t = setTimeout(() => { n = 0; }, 1500);
        if (n >= 7) location.href = 'dev.html';
      });
    })();
  </script>
</body>
</html>
