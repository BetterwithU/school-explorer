<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR코드 생성</title>
  <script src="qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      color: #e94560;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #a8dadc;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    .base-url-row {
      max-width: 600px;
      margin: 0 auto 24px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .base-url-row input {
      flex: 1;
      background: #16213e;
      border: 1px solid #0f3460;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
    }

    .base-url-row button {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* 장소(미션)마다 한 행 */
    .grid {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .place-row {
      border: 1px solid #2a3a5e;
      border-radius: 14px;
      padding: 12px 14px;
      background: #141d33;
    }
    .place-head {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid #2a3a5e;
    }
    .place-name { font-size: 1.05rem; font-weight: bold; color: #ffd166; }
    .place-type { font-size: 0.78rem; color: #8b9bb4; }
    /* 같은 장소 QR을 한 줄에 나란히 (1~4개 가변) */
    .row-cards { display: flex; flex-wrap: wrap; gap: 12px; }
    .row-cards .qr-card { flex: 0 0 auto; width: 160px; }

    .qr-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      color: #1a1a2e;
    }

    .qr-label {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #e94560;
    }

    .qr-cat {
      font-size: 0.75rem;
      color: #555;
      margin-top: 8px;
    }

    .qr-box {
      display: flex;
      justify-content: center;
    }

    .print-btn {
      display: block;
      max-width: 700px;
      margin: 24px auto 0;
      background: #0f3460;
      color: #a8dadc;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #a8dadc;
      text-decoration: none;
      font-size: 0.9rem;
    }

    @media print {
      body { background: #fff; color: #000; }
      .base-url-row, .print-btn, .back-link, h1, .subtitle { display: none; }
      .place-row { border: 1px solid #bbb; background: #fff; break-inside: avoid; page-break-inside: avoid; }
      .place-name { color: #000; }
      .place-type { color: #555; }
      .qr-card { border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <h1>🔳 장소별 QR코드</h1>
  <p class="subtitle">장소마다 QR 개수가 달라요. 공통(1개)은 모두 같은 걸 스캔, 협력(A·B·C·D)은 인원수만큼 나란히 붙여 한 명씩 스캔합니다.</p>

  <div class="base-url-row">
    <input type="text" id="baseUrl" placeholder="https://betterwithu.github.io/school-explorer">
    <button onclick="renderQRCodes()">QR 생성</button>
  </div>

  <div class="grid" id="grid"></div>

  <button class="print-btn" onclick="window.print()">🖨️ QR코드 인쇄하기</button>
  <a href="hq.html" class="back-link">← 대시보드로 돌아가기</a>

  <script>
    const DEFAULT_BASE = 'https://betterwithu.github.io/school-explorer';

    function renderQRCodes() {
      const base = (document.getElementById('baseUrl').value.trim() || DEFAULT_BASE).replace(/\/$/, '');
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      fetch('course.json')
        .then(r => r.json())
        .then(course => {
          // 장소(미션)마다 한 행(.place-row). 같은 장소 QR은 한 줄에 나란히,
          // 장소가 바뀌면 다음 행으로. 한 줄에 1개~4개까지 가변.
          course.missions.forEach(m => {
            const qids = m.qids || [];
            const isCommon = qids.length === 1;
            const isClue = m.mode === 'clue';

            const row = document.createElement('div');
            row.className = 'place-row';
            const typeLabel = isCommon ? '공통 1개' : isClue ? `단서 ${qids.length}개` : `협력 ${qids.length}개`;
            row.innerHTML = `<div class="place-head"><span class="place-name">${m.placeName}</span><span class="place-type">${typeLabel}</span></div>`;
            const cards = document.createElement('div');
            cards.className = 'row-cards';
            row.appendChild(cards);
            grid.appendChild(row);

            qids.forEach((qid, i) => {
              const slot = String.fromCharCode(65 + i); // A,B,C,D
              const tag = isCommon ? '공통' : isClue ? `단서 ${slot}` : slot;
              const url = `${base}/mission.html?q=${encodeURIComponent(qid)}`;
              const card = document.createElement('div');
              card.className = 'qr-card';
              card.innerHTML = `
                <div class="qr-label">${qid} (${tag})</div>
                <div class="qr-box" id="qr-${qid}"></div>
                <div class="qr-cat">${url}</div>
              `;
              cards.appendChild(card);
              new QRCode(document.getElementById(`qr-${qid}`), {
                text: url, width: 150, height: 150,
                colorDark: '#1a1a2e', colorLight: '#ffffff',
              });
            });
          });
        });
    }

    document.getElementById('baseUrl').value = DEFAULT_BASE;
    renderQRCodes();
  </script>

  <!-- 제목 7번 연속 클릭 → 개발자 콘솔(새 창) -->
  <script>
    document.addEventListener('click', (e) => {
      const h = e.target.closest('h1');
      if (!h) return;
      window._devN = (window._devN || 0) + 1;
      clearTimeout(window._devT);
      window._devT = setTimeout(() => { window._devN = 0; }, 1500);
      if (window._devN >= 7) { window._devN = 0; window.open('dev.html', '_blank'); }
    });
  </script>
</body>
</html>
