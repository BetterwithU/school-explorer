<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR코드 생성</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      color: #e94560;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #a8dadc;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    .base-url-row {
      max-width: 600px;
      margin: 0 auto 24px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .base-url-row input {
      flex: 1;
      background: #16213e;
      border: 1px solid #0f3460;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
    }

    .base-url-row button {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 700px;
      margin: 0 auto;
    }

    .qr-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      color: #1a1a2e;
    }

    .qr-label {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #e94560;
    }

    .qr-cat {
      font-size: 0.75rem;
      color: #555;
      margin-top: 8px;
    }

    .qr-box {
      display: flex;
      justify-content: center;
    }

    .print-btn {
      display: block;
      max-width: 700px;
      margin: 24px auto 0;
      background: #0f3460;
      color: #a8dadc;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #a8dadc;
      text-decoration: none;
      font-size: 0.9rem;
    }

    @media print {
      body { background: #fff; color: #000; }
      .qr-card { border: 1px solid #ddd; }
      .base-url-row, .print-btn, .back-link, h1, .subtitle { display: none; }
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <h1>🔳 QR코드 생성</h1>
  <p class="subtitle">URL을 입력하고 새로고침 버튼을 누르면 QR코드가 업데이트됩니다.</p>

  <div class="base-url-row">
    <input type="text" id="baseUrl" placeholder="https://betterwithu.github.io/school-explorer">
    <button onclick="renderQRCodes()">QR 생성</button>
  </div>

  <div class="grid" id="grid"></div>

  <button class="print-btn" onclick="window.print()">🖨️ QR코드 인쇄하기</button>
  <a href="index.html" class="back-link">← 메인으로 돌아가기</a>

  <script>
    const DEFAULT_BASE = 'https://betterwithu.github.io/school-explorer';

    function renderQRCodes() {
      const base = (document.getElementById('baseUrl').value.trim() || DEFAULT_BASE).replace(/\/$/, '');
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      fetch('questions.json')
        .then(r => r.json())
        .then(questions => {
          questions.forEach(q => {
            const url = `${base}/question.html?id=${q.id}`;
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.innerHTML = `
              <div class="qr-label">Q${q.id} — ${q.category}</div>
              <div class="qr-box" id="qr-${q.id}"></div>
              <div class="qr-cat">${url}</div>
            `;
            grid.appendChild(card);
            new QRCode(document.getElementById(`qr-${q.id}`), {
              text: url,
              width: 150,
              height: 150,
              colorDark: '#1a1a2e',
              colorLight: '#ffffff',
            });
          });
        });
    }

    document.getElementById('baseUrl').value = DEFAULT_BASE;
    renderQRCodes();
  </script>
</body>
</html>
