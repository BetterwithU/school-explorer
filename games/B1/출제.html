<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 출제 — Station 빌더 (중2 탐험)</title>

  <!-- LaTeX 렌더링 (KaTeX) — 출제는 실내에서 하므로 CDN 사용 OK -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1424; --panel: #16213e; --panel2: #1b2747; --line: #28365e;
      --ink: #e6eefc; --muted: #8b9bb4; --accent: #2ec4b6; --accent2: #7dd3fc;
      --warn: #f4a261; --danger: #e94560; --gold: #ffd166;
    }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Nanum Gothic', sans-serif;
      background: var(--bg); color: var(--ink); min-height: 100dvh; padding-bottom: 80px;
    }
    .wrap { max-width: 840px; margin: 0 auto; padding: 16px 14px; }

    /* ── 상단 고정 툴바 ── */
    .toolbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,20,36,0.96); backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      padding: 10px 14px;
    }
    .toolbar h1 { font-size: 1.05rem; color: var(--accent2); margin-right: auto; }
    .btn {
      border: 1px solid var(--line); background: var(--panel2); color: var(--ink);
      padding: 8px 13px; border-radius: 9px; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: filter .15s, transform .1s;
    }
    .btn:hover { filter: brightness(1.2); }
    .btn:active { transform: scale(.97); }
    .btn.primary { background: linear-gradient(135deg,#2ec4b6,#1a9b8f); border-color: transparent; color: #06281f; }
    .btn.ghost { background: transparent; }
    .btn.warn { background: rgba(244,162,97,.15); border-color: rgba(244,162,97,.5); color: var(--warn); }

    .folder-chip {
      font-size: 0.76rem; padding: 5px 10px; border-radius: 20px;
      border: 1px solid var(--line); color: var(--muted); white-space: nowrap;
    }
    .folder-chip.linked { color: var(--accent); border-color: rgba(46,196,182,.5); background: rgba(46,196,182,.08); }

    /* ── 게임 설정 ── */
    .settings {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      padding: 16px; margin: 16px 0;
    }
    .settings h2 { font-size: 0.9rem; color: var(--accent2); margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
    label.fld { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; }
    .fld-note { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    input[type=text], input[type=number], textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
      border-radius: 8px; padding: 9px 11px; font-size: 0.92rem; font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent2); }
    textarea { resize: vertical; min-height: 78px; line-height: 1.5; }

    /* ── Station 카드 ── */
    #stations { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
    .station {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      padding: 16px; position: relative;
    }
    .st-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .st-no {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg,#2ec4b6,#1a9b8f); color: #06281f;
      display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem;
    }
    .st-title { font-weight: 800; font-size: 0.98rem; }
    .st-actions { margin-left: auto; display: flex; gap: 6px; }
    .icon-btn {
      border: 1px solid var(--line); background: var(--panel2); color: var(--muted);
      width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
    }
    .icon-btn:hover { filter: brightness(1.3); }
    .icon-btn.del:hover { color: var(--danger); border-color: rgba(233,69,96,.5); }

    .row { margin-bottom: 13px; }
    .row:last-child { margin-bottom: 0; }

    /* 이미지 입력 묶음 */
    .img-field { border: 1px dashed var(--line); border-radius: 10px; padding: 10px; background: var(--panel2); }
    .img-field .img-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .img-field input[type=text] { flex: 1; min-width: 160px; }
    .file-btn {
      border: 1px solid var(--line); background: var(--bg); color: var(--accent2);
      padding: 8px 12px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; white-space: nowrap; font-weight: 700;
    }
    .file-btn:hover { filter: brightness(1.3); }
    .img-preview { margin-top: 9px; display: none; }
    .img-preview.show { display: block; }
    .img-preview img {
      max-width: 100%; max-height: 180px; border-radius: 8px; border: 1px solid var(--line); display: block;
    }
    .img-path { font-size: 0.72rem; color: var(--muted); margin-top: 4px; word-break: break-all; }

    /* LaTeX 미리보기 */
    .preview {
      margin-top: 8px; background: #fbfaf5; color: #1a1a1a; border-radius: 8px;
      padding: 11px 13px; font-size: 0.98rem; line-height: 1.7; min-height: 20px;
      border: 1px solid var(--line);
    }
    .preview:empty::before { content: '미리보기 (수식은 $...$ 또는 $$...$$)'; color: #999; font-style: italic; }
    .preview img { max-width: 100%; border-radius: 6px; margin-top: 8px; }

    /* 힌트 */
    .hints-wrap { display: flex; flex-direction: column; gap: 7px; }
    .hint-row { display: flex; gap: 7px; align-items: center; }
    .hint-row input { flex: 1; }
    .hint-row .hno { font-size: 0.74rem; color: var(--muted); width: 42px; flex-shrink: 0; }
    .add-hint {
      align-self: flex-start; font-size: 0.78rem; color: var(--accent2);
      background: transparent; border: 1px dashed var(--line); border-radius: 7px; padding: 6px 11px; cursor: pointer; margin-top: 2px;
    }
    .add-hint:hover { filter: brightness(1.3); }

    /* 하단 추가 버튼 */
    .add-station {
      width: 100%; margin-top: 16px; padding: 15px;
      border: 2px dashed var(--line); background: transparent; color: var(--accent2);
      border-radius: 14px; font-size: 0.95rem; font-weight: 800; cursor: pointer;
    }
    .add-station:hover { filter: brightness(1.3); border-color: var(--accent2); }

    /* 하단 상태바 */
    .statusbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
      background: rgba(22,33,62,0.97); border-top: 1px solid var(--line);
      padding: 11px 16px; font-size: 0.85rem; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .statusbar b { color: var(--gold); }
    .statusbar .save-state { margin-left: auto; color: var(--muted); font-size: 0.78rem; }

    .hidden-file { display: none; }
    .toast {
      position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
      background: #06281f; color: #d7fff5; border: 1px solid var(--accent);
      padding: 11px 18px; border-radius: 10px; font-size: 0.88rem; z-index: 100;
      opacity: 0; transition: opacity .25s; pointer-events: none; white-space: pre-line; text-align: center;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>🎯 출제 · Station 빌더</h1>
    <span class="folder-chip" id="folderChip">📁 폴더 미연결</span>
    <button class="btn ghost" id="btnFolder">📁 폴더 연결</button>
    <button class="btn ghost" id="btnLoad">📂 불러오기</button>
    <button class="btn primary" id="btnSave">💾 저장 (stations.json)</button>
  </div>

  <div class="wrap">
    <!-- 미저장 초안 복구 배너 (파일과 다를 때만 표시) -->
    <div id="draftBanner" style="display:none; background:rgba(244,162,97,.15); border:1px solid rgba(244,162,97,.5); color:var(--warn); border-radius:12px; padding:12px 14px; margin:14px 0; gap:10px; align-items:center; flex-wrap:wrap;">
      <span style="margin-right:auto">💾 저장 안 된 편집 초안이 있습니다. (현재 파일 내용으로 화면을 띄웠어요)</span>
      <button class="btn warn" id="btnRestoreDraft">초안 복구</button>
      <button class="btn ghost" id="btnDiscardDraft">파일 그대로 쓰기</button>
    </div>

    <!-- 게임 설정 -->
    <div class="settings">
      <h2>⚙️ 게임 설정</h2>
      <div class="grid">
        <div>
          <label class="fld" for="setTitle">게임 제목</label>
          <input type="text" id="setTitle" placeholder="예: 중2 학교 탐험 레이스">
        </div>
        <div>
          <label class="fld" for="setNeed">우승 조건 — 몇 개 풀면 우승?</label>
          <input type="number" id="setNeed" min="1" placeholder="예: 12">
          <div class="fld-note" id="needNote">전체 station 수에서 자동 추천(−3)됩니다.</div>
        </div>
        <div>
          <label class="fld" for="setHintBudget">힌트 총량 (조 전체가 쓸 수 있는 힌트 개수)</label>
          <input type="number" id="setHintBudget" min="0" placeholder="예: 5">
        </div>
        <div>
          <label class="fld" for="setTeams">조 목록 (쉼표로 구분 · 비우면 자동)</label>
          <input type="text" id="setTeams" placeholder="예: 1조,2조,3조 ... (결석 대비 유동)">
        </div>
      </div>
    </div>

    <!-- Station 카드들 -->
    <div id="stations"></div>

    <button class="add-station" id="btnAdd">➕ Station 추가</button>
  </div>

  <!-- 하단 상태바 -->
  <div class="statusbar">
    <span>📍 현재 <b id="stCount">0</b>개 station</span>
    <span>🏁 우승 <b id="needShow">–</b>개 풀면</span>
    <span>💡 힌트 총량 <b id="hbShow">–</b></span>
    <span class="save-state" id="saveState">자동저장 대기</span>
  </div>

  <input type="file" accept="image/*" class="hidden-file" id="filePicker">
  <input type="file" accept=".json,application/json" class="hidden-file" id="jsonPicker">
  <div class="toast" id="toast"></div>

  <!-- 교사 전용 게이트 -->
  <script src="../../firebase-config.js"></script>
  <script type="module" src="../../core/auth.js"></script>
  <script src="teacher-gate.js"></script>

  <script>
  /* ============================================================
   * 출제 Station 빌더 (프로토타입)
   * - N문항 → station N개를 유동적으로 받아들이는 출제 도구.
   * - 이미지: 크롬(크롬북) File System Access API로 레포 images/ 폴더에 직접 저장.
   *   미지원/미연결 시 URL 붙여넣기로 대체. (base64 인라인 금지 규칙 준수)
   * - 초안은 localStorage 자동 저장(이미지는 경로/URL만 저장 — 파일은 디스크에).
   * - 출력: stations.json  { meta, stations:[...] }
   * ============================================================ */

  // 편집할 게임세트: ?set=B1 (engine 비의존 — 출제는 독립 도구). 영숫자만 허용.
  const SET = (() => { const s = new URLSearchParams(location.search).get('set'); return (s && /^[A-Za-z0-9]+$/.test(s)) ? s : 'B1'; })();
  const SET_BASE = 'sets/' + SET + '/';
  const LS_KEY = 'b1_station_builder_draft_' + SET;   // 세트별 초안 분리
  const KATEX_DELIMS = [
    { left: '$$', right: '$$', display: true },
    { left: '$', right: '$', display: false },
  ];
  // 점·꼭짓점 대문자는 데이터(stations.json)에서 \mathrm{...}로 묶어 로만체로 표기한다.

  // ---- 상태 ----
  let state = {
    meta: { title: '', need: null, hintBudget: null, teams: '' },
    stations: [],
  };
  let dirHandle = null;            // File System Access 폴더 핸들
  let imagesDirHandle = null;
  let uid = 1;                     // 카드 내부 식별자(렌더 추적용)
  const objectUrls = [];          // 미리보기용 ObjectURL (정리용)

  // ---- 유틸 ----
  const $ = (sel, el = document) => el.querySelector(sel);
  const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));
  function toast(msg) {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(window.__tt); window.__tt = setTimeout(() => t.classList.remove('show'), 2200);
  }
  function newStation() {
    return { _id: uid++, place: '', indoor: false, cluePhoto: '', question: '', questionImage: '', answer: '', hints: [''] };
  }
  function fssSupported() { return 'showDirectoryPicker' in window; }

  // ---- 자동저장 (디바운스) ----
  let saveTimer = null;
  function scheduleSave() {
    $('#saveState').textContent = '저장 중…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        const now = new Date();
        $('#saveState').textContent = '초안 자동저장됨 ' + now.toLocaleTimeString('ko-KR');
      } catch (e) { $('#saveState').textContent = '자동저장 실패: ' + e.message; }
    }, 400);
  }

  // ---- 폴더 연결 ----
  async function connectFolder() {
    if (!fssSupported()) {
      toast('이 브라우저는 폴더 직접저장 미지원.\n크롬(크롬북)에서 열거나 URL 입력을 쓰세요.');
      return;
    }
    try {
      dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      imagesDirHandle = await dirHandle.getDirectoryHandle('images', { create: true });
      $('#folderChip').textContent = '📁 ' + dirHandle.name + ' 연결됨';
      $('#folderChip').classList.add('linked');
      toast('폴더 연결 완료 — 이미지가 images/ 에 저장됩니다');
    } catch (e) {
      if (e.name !== 'AbortError') toast('폴더 연결 취소/실패');
    }
  }

  // 이미지 파일을 images/ 폴더에 저장하고 상대경로 반환
  async function saveImageToFolder(file, baseName) {
    if (!imagesDirHandle) throw new Error('폴더 미연결');
    const ext = (file.name.split('.').pop() || 'img').toLowerCase();
    const fname = `${baseName}.${ext}`;
    const fh = await imagesDirHandle.getFileHandle(fname, { create: true });
    const w = await fh.createWritable();
    await w.write(file);
    await w.close();
    return `images/${fname}`;
  }

  // ---- 렌더 ----
  function render() {
    const root = $('#stations');
    root.innerHTML = '';
    state.stations.forEach((st, i) => root.appendChild(renderStation(st, i)));
    // 박스가 DOM에 붙은 다음 프레임에 수식을 렌더(붙기 전 렌더는 빈 박스를 훑고 지나감).
    requestAnimationFrame(() => renderMath());
    updateStatus();
  }

  function renderStation(st, idx) {
    const n = idx + 1;
    const el = document.createElement('div');
    el.className = 'station';
    el.dataset.id = st._id;
    el.innerHTML = `
      <div class="st-head">
        <div class="st-no">${n}</div>
        <div class="st-title">Station ${n}</div>
        <div class="st-actions">
          <button class="icon-btn" data-act="up" title="위로">▲</button>
          <button class="icon-btn" data-act="down" title="아래로">▼</button>
          <button class="icon-btn del" data-act="del" title="삭제">🗑</button>
        </div>
      </div>

      <div class="row">
        <label class="fld">📍 장소 표기 (정답지·대시보드용 라벨)</label>
        <input type="text" data-f="place" value="${esc(st.place)}" placeholder="예: 도서관 입구 (1층)">
      </div>

      <div class="row">
        <label class="fld">🏠 장소 유형 (와이파이 끊긴 조를 실내로 보내 재접속시킴)</label>
        <label style="font-size:0.92rem;color:var(--ink);display:inline-flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" data-indoor ${st.indoor ? 'checked' : ''} style="width:auto;transform:scale(1.3)"> 실내 (와이파이 잡히는 곳)
        </label>
      </div>

      <div class="row">
        <label class="fld">🧭 장소 단서 사진 (이 station을 찾아가게 하는 내비 사진)</label>
        ${imgFieldHtml('cluePhoto', st.cluePhoto)}
      </div>

      <div class="row">
        <label class="fld">❓ 문제 텍스트 (수식 LaTeX 지원: $x^2$ , $$\\frac{1}{2}$$)</label>
        <textarea data-f="question" placeholder="문제를 입력하세요. 수식은 $...$">${esc(st.question)}</textarea>
        <div class="preview" data-prev="question"></div>
      </div>

      <div class="row">
        <label class="fld">🖼️ 문제 이미지 (선택 — 이미지+텍스트 문제용)</label>
        ${imgFieldHtml('questionImage', st.questionImage)}
      </div>

      <div class="row">
        <label class="fld">✅ 정답 (단답형)</label>
        <input type="text" data-f="answer" value="${esc(st.answer)}" placeholder="예: 5/6  또는  마라탕">
      </div>

      <div class="row">
        <label class="fld">💡 힌트 (위→아래 점점 구체적으로)</label>
        <div class="hints-wrap" data-hints></div>
        <button class="add-hint" data-act="addhint">+ 힌트 추가</button>
      </div>
    `;
    // 힌트 렌더
    const hwrap = $('[data-hints]', el);
    (st.hints && st.hints.length ? st.hints : ['']).forEach((h, hi) => hwrap.appendChild(hintRow(h, hi)));

    // ---- 이벤트 바인딩 ----
    // 텍스트/일반 필드
    $$('[data-f]', el).forEach(inp => {
      inp.addEventListener('input', () => {
        st[inp.dataset.f] = inp.value;
        if (inp.dataset.f === 'question') updatePreview(el, st);
        scheduleSave();
      });
    });
    // 실내/실외 체크
    const indoorCb = $('[data-indoor]', el);
    if (indoorCb) indoorCb.addEventListener('change', () => { st.indoor = indoorCb.checked; scheduleSave(); });
    // 카드 액션
    $$('[data-act]', el).forEach(btn => {
      btn.addEventListener('click', () => handleAction(btn.dataset.act, st, idx, el));
    });
    // 이미지 필드
    bindImgField(el, st, 'cluePhoto', n, 'clue');
    bindImgField(el, st, 'questionImage', n, 'q');

    // 초기 미리보기 — 박스 텍스트를 동기적으로 채운다. 수식 렌더는 render() 끝의 renderMath()가
    // 모든 박스를 한 번에 처리(KaTeX defer 로딩도 거기서 재시도). 박스별 setTimeout 재시도는
    // 서로 경합해 일부가 누락되므로 쓰지 않는다.
    fillPreviewText(el, st);
    return el;
  }

  function imgFieldHtml(field, val) {
    return `
      <div class="img-field" data-imgfield="${field}">
        <div class="img-row">
          <button type="button" class="file-btn" data-pick>📤 파일 선택 → images/ 저장</button>
          <input type="text" data-url placeholder="또는 이미지 URL 붙여넣기" value="${esc(val)}">
        </div>
        <div class="img-preview ${val ? 'show' : ''}" data-imgprev>
          ${val ? `<img src="${esc(val)}" alt="">` : ''}
          <div class="img-path">${val ? esc(val) : ''}</div>
        </div>
      </div>`;
  }

  function bindImgField(cardEl, st, field, stationNo, kind) {
    const wrap = $(`[data-imgfield="${field}"]`, cardEl);
    const urlInput = $('[data-url]', wrap);
    const prev = $('[data-imgprev]', wrap);
    const pickBtn = $('[data-pick]', wrap);

    function showPreview(src, pathText) {
      prev.innerHTML = `<img src="${src}" alt=""><div class="img-path">${esc(pathText || src)}</div>`;
      prev.classList.add('show');
    }
    // URL 직접 입력
    urlInput.addEventListener('input', () => {
      st[field] = urlInput.value.trim();
      if (st[field]) showPreview(st[field], st[field]); else { prev.classList.remove('show'); prev.innerHTML = ''; }
      scheduleSave();
    });
    // 파일 선택 → 저장
    pickBtn.addEventListener('click', () => {
      const picker = $('#filePicker');
      picker.value = '';
      picker.onchange = async () => {
        const file = picker.files[0];
        if (!file) return;
        // 즉시 미리보기(ObjectURL)
        const ou = URL.createObjectURL(file); objectUrls.push(ou);
        showPreview(ou, '저장 중…');
        if (imagesDirHandle) {
          try {
            const path = await saveImageToFolder(file, `s${stationNo}_${kind}`);
            st[field] = path; urlInput.value = path;
            showPreview(ou, path);
            scheduleSave();
            toast(`저장됨: ${path}`);
          } catch (e) {
            toast('저장 실패: ' + e.message);
          }
        } else {
          // 폴더 미연결 — 경로만 제안, 저장은 안 됨
          const ext = (file.name.split('.').pop() || 'img').toLowerCase();
          const path = `images/s${stationNo}_${kind}.${ext}`;
          st[field] = path; urlInput.value = path;
          showPreview(ou, path + '  ⚠️ 폴더 미연결: 이 파일을 직접 images/에 넣어주세요');
          scheduleSave();
          toast('폴더 미연결 — 경로만 기록됨.\n📁 폴더 연결 후 다시 선택하면 자동 저장됩니다.');
        }
      };
      picker.click();
    });
  }

  function hintRow(val, idx) {
    const row = document.createElement('div');
    row.className = 'hint-row';
    row.innerHTML = `
      <span class="hno">힌트 ${idx + 1}</span>
      <input type="text" value="${esc(val)}" placeholder="힌트 내용">
      <button class="icon-btn del" title="삭제">✕</button>`;
    return row;
  }

  function handleAction(act, st, idx, el) {
    if (act === 'del') {
      if (!confirm(`Station ${idx + 1}을(를) 삭제할까요?`)) return;
      state.stations.splice(idx, 1); render(); scheduleSave();
    } else if (act === 'up' && idx > 0) {
      [state.stations[idx - 1], state.stations[idx]] = [state.stations[idx], state.stations[idx - 1]];
      render(); scheduleSave();
    } else if (act === 'down' && idx < state.stations.length - 1) {
      [state.stations[idx + 1], state.stations[idx]] = [state.stations[idx], state.stations[idx + 1]];
      render(); scheduleSave();
    } else if (act === 'addhint') {
      st.hints.push(''); syncHints(st, el); scheduleSave();
    }
  }

  // 힌트 영역만 다시 그림 (전체 재렌더 없이)
  function syncHints(st, el) {
    const hwrap = $('[data-hints]', el);
    hwrap.innerHTML = '';
    st.hints.forEach((h, hi) => {
      const row = hintRow(h, hi);
      const input = $('input', row);
      input.addEventListener('input', () => { st.hints[hi] = input.value; scheduleSave(); });
      $('.del', row).addEventListener('click', () => {
        st.hints.splice(hi, 1);
        if (st.hints.length === 0) st.hints.push('');
        syncHints(st, el); scheduleSave();
      });
      hwrap.appendChild(row);
    });
  }

  // 미리보기 박스에 문제 텍스트만 채운다(수식 렌더 X).
  function fillPreviewText(cardEl, st) {
    const prev = $('[data-prev="question"]', cardEl);
    if (!prev) return prev;
    prev.innerHTML = esc(st.question).replace(/\n/g, '<br>');
    return prev;
  }
  // 타이핑 시: 텍스트 갱신 + 그 박스만 수식 렌더.
  function updatePreview(cardEl, st) {
    const prev = fillPreviewText(cardEl, st);
    if (prev) renderMathIn(prev);
  }

  function renderMath() { renderMathIn(document.body); }
  function renderMathIn(el, tries) {
    tries = tries || 0;
    if (window.renderMathInElement) {
      try { window.renderMathInElement(el, { delimiters: KATEX_DELIMS, throwOnError: false }); } catch (e) {}
    } else if (tries < 25) {
      setTimeout(() => renderMathIn(el, tries + 1), 150);   // KaTeX(defer) 아직 로딩 중 → 잠시 후 재시도
    }
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ---- 상태바 / 설정 ----
  function updateStatus() {
    const n = state.stations.length;
    $('#stCount').textContent = n;
    // 우승 조건 자동 추천(−3, 최소 1)
    if (state.meta.need == null || state.meta.need === '') {
      const rec = Math.max(1, n - 3);
      $('#needShow').textContent = n ? rec + ' (추천)' : '–';
      $('#needNote').textContent = n ? `현재 ${n}개 → 추천 ${rec}개 (직접 입력 가능)` : '전체 station 수에서 자동 추천(−3)됩니다.';
    } else {
      $('#needShow').textContent = state.meta.need;
      $('#needNote').textContent = `직접 설정: ${state.meta.need}개`;
    }
    $('#hbShow').textContent = (state.meta.hintBudget == null || state.meta.hintBudget === '') ? '제한없음' : state.meta.hintBudget;
  }

  function bindSettings() {
    $('#setTitle').addEventListener('input', e => { state.meta.title = e.target.value; scheduleSave(); });
    $('#setNeed').addEventListener('input', e => { state.meta.need = e.target.value === '' ? null : +e.target.value; updateStatus(); scheduleSave(); });
    $('#setHintBudget').addEventListener('input', e => { state.meta.hintBudget = e.target.value === '' ? null : +e.target.value; updateStatus(); scheduleSave(); });
    $('#setTeams').addEventListener('input', e => { state.meta.teams = e.target.value; scheduleSave(); });
  }
  function fillSettings() {
    $('#setTitle').value = state.meta.title || '';
    $('#setNeed').value = state.meta.need ?? '';
    $('#setHintBudget').value = state.meta.hintBudget ?? '';
    $('#setTeams').value = state.meta.teams || '';
  }

  // ---- 저장 / 불러오기 (stations.json) ----
  function buildOutput() {
    const n = state.stations.length;
    const need = (state.meta.need == null || state.meta.need === '') ? Math.max(1, n - 3) : +state.meta.need;
    const teams = (state.meta.teams || '').split(',').map(s => s.trim()).filter(Boolean);
    return {
      meta: {
        title: state.meta.title || '제목 없음',
        stationCount: n,
        need,
        hintBudget: (state.meta.hintBudget == null || state.meta.hintBudget === '') ? null : +state.meta.hintBudget,
        teams,
        createdWith: '출제.html (B1 prototype)',
      },
      stations: state.stations.map((st, i) => ({
        id: i + 1,
        place: st.place || '',
        indoor: !!st.indoor,
        cluePhoto: st.cluePhoto || '',
        question: st.question || '',
        questionImage: st.questionImage || '',
        answer: st.answer || '',
        hints: (st.hints || []).map(h => h.trim()).filter(Boolean),
      })),
    };
  }

  async function saveJSON() {
    if (state.stations.length === 0) { toast('Station이 없습니다. 먼저 추가하세요.'); return; }
    const data = buildOutput();
    const json = JSON.stringify(data, null, 2);
    if (dirHandle) {
      try {
        const fh = await dirHandle.getFileHandle('stations.json', { create: true });
        const w = await fh.createWritable(); await w.write(json); await w.close();
        toast('저장 완료 → ' + dirHandle.name + '/stations.json');
        return;
      } catch (e) { toast('폴더 저장 실패, 다운로드로 대체: ' + e.message); }
    }
    // 폴백: 다운로드
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'stations.json'; a.click();
    URL.revokeObjectURL(a.href);
    toast('stations.json 다운로드됨 (폴더 미연결)');
  }

  async function loadJSON() {
    // 폴더 연결돼 있으면 거기서, 아니면 파일 선택
    if (dirHandle) {
      try {
        const fh = await dirHandle.getFileHandle('stations.json');
        const file = await fh.getFile();
        applyLoaded(JSON.parse(await file.text()));
        toast('stations.json 불러옴 (폴더)');
        return;
      } catch (e) { /* 없으면 파일 선택으로 */ }
    }
    const picker = $('#jsonPicker'); picker.value = '';
    picker.onchange = async () => {
      const file = picker.files[0]; if (!file) return;
      try { applyLoaded(JSON.parse(await file.text())); toast('불러오기 완료'); }
      catch (e) { toast('불러오기 실패: ' + e.message); }
    };
    picker.click();
  }

  function applyLoaded(data, opts = {}) {
    state.meta = {
      title: data.meta?.title || '',
      need: data.meta?.need ?? null,
      hintBudget: data.meta?.hintBudget ?? null,
      teams: Array.isArray(data.meta?.teams) ? data.meta.teams.join(',') : (data.meta?.teams || ''),
    };
    state.stations = (data.stations || []).map(s => ({
      _id: uid++,
      place: s.place || '', indoor: !!s.indoor, cluePhoto: s.cluePhoto || '',
      question: s.question || '', questionImage: s.questionImage || '',
      answer: s.answer || '', hints: (s.hints && s.hints.length ? s.hints : ['']),
    }));
    fillSettings(); render();
    if (!opts.silent) scheduleSave();   // 파일 자동로드(silent) 시엔 초안을 새로 쓰지 않는다
  }

  // 휘발 필드(_id) 제외하고 "출력 형태"로 정규화 → 파일 vs 초안 동일 기준 비교
  function normalize(d) {
    return JSON.stringify({
      meta: {
        title: d.meta?.title || '',
        need: d.meta?.need ?? null,
        hintBudget: d.meta?.hintBudget ?? null,
        teams: Array.isArray(d.meta?.teams) ? d.meta.teams.join(',') : (d.meta?.teams || ''),
      },
      stations: (d.stations || []).map(s => ({
        place: s.place || '', indoor: !!s.indoor, cluePhoto: s.cluePhoto || '',
        question: s.question || '', questionImage: s.questionImage || '',
        answer: s.answer || '', hints: (s.hints || []).map(h => (h || '').trim()).filter(Boolean),
      })),
    });
  }

  // 미저장 초안이 파일과 다를 때만 복구 배너 제안(조용히 덮지 않는다)
  function showDraftBanner(draft) {
    const b = $('#draftBanner');
    if (!b) return;
    b.style.display = 'flex';
    $('#btnRestoreDraft').onclick = () => {
      applyLoaded(draft); b.style.display = 'none'; toast('편집 초안을 복구했습니다');
    };
    $('#btnDiscardDraft').onclick = () => {
      try { localStorage.removeItem(LS_KEY); } catch (e) {}
      b.style.display = 'none'; toast('초안을 버리고 파일 버전을 사용합니다');
    };
  }

  // ---- 초기화 ----
  async function init() {
    // 1) 항상 현재 파일(stations.json)에서 출발 — 빌더는 게임이 쓰는 최신 문제를 보여준다.
    let fileData = null;
    try {
      const res = await fetch(SET_BASE + 'stations.json', { cache: 'no-store' });
      if (res.ok) { fileData = await res.json(); applyLoaded(fileData, { silent: true }); }
    } catch (e) {}

    // 2) 미저장 편집 초안이 있고 파일과 다르면 → 조용히 덮지 말고 복구 배너로 제안.
    try {
      const draft = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (draft && draft.stations && draft.stations.length) {
        if (!fileData || normalize(draft) !== normalize(fileData)) {
          showDraftBanner(draft);
        } else {
          localStorage.removeItem(LS_KEY);   // 초안=파일이면 군더더기 제거
        }
      }
    } catch (e) {}

    if (state.stations.length === 0) state.stations.push(newStation());

    bindSettings(); fillSettings(); render();

    $('#btnFolder').addEventListener('click', connectFolder);
    $('#btnSave').addEventListener('click', saveJSON);
    $('#btnLoad').addEventListener('click', loadJSON);
    $('#btnAdd').addEventListener('click', () => {
      state.stations.push(newStation());
      render(); scheduleSave();
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    if (!fssSupported()) {
      $('#folderChip').textContent = '📁 폴더저장 미지원(크롬 권장)';
    }
  }

  // 힌트 입력 바인딩은 syncHints에서 처리하므로, 최초 render 후 힌트 이벤트 부여
  const _origRenderStation = renderStation;
  renderStation = function (st, idx) {
    const el = _origRenderStation(st, idx);
    // 힌트 입력 이벤트(최초 렌더 분) 부여
    const hwrap = $('[data-hints]', el);
    $$('.hint-row', hwrap).forEach((row, hi) => {
      const input = $('input', row);
      input.addEventListener('input', () => { st.hints[hi] = input.value; scheduleSave(); });
      $('.del', row).addEventListener('click', () => {
        st.hints.splice(hi, 1);
        if (st.hints.length === 0) st.hints.push('');
        syncHints(st, el); scheduleSave();
      });
    });
    return el;
  };

  // KaTeX 로드 후 시작
  window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
