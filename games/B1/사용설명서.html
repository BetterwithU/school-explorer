<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 운영 사용설명서 — 중2 탐험 레이스</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: #0f1424; color: #e6eefc; margin: 0; line-height: 1.7; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }
    h1 { color: #c4b5fd; font-size: 1.7rem; border-bottom: 2px solid #28365e; padding-bottom: 12px; }
    h2 { color: #7dd3fc; font-size: 1.25rem; margin-top: 38px; border-left: 4px solid #2e74c4; padding-left: 12px; }
    h3 { color: #aee08a; font-size: 1.02rem; margin-top: 24px; }
    p, li { color: #d3def0; }
    blockquote { border-left: 3px solid #f4a261; background: rgba(244,162,97,.08); margin: 14px 0; padding: 10px 16px; color: #ffe8b3; border-radius: 0 8px 8px 0; }
    code { background: #1e2840; color: #9fd8c4; padding: 2px 6px; border-radius: 5px; font-size: 0.88em; }
    pre { background: #0c1322; border: 1px solid #28365e; border-radius: 10px; padding: 14px 16px; overflow-x: auto; }
    pre code { background: none; color: #cfe3ff; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.92rem; }
    th, td { border: 1px solid #28365e; padding: 8px 11px; text-align: left; vertical-align: top; }
    th { background: #16213e; color: #7dd3fc; }
    tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    a { color: #7dd3fc; }
    strong { color: #fff; }
    hr { border: none; border-top: 1px solid #28365e; margin: 30px 0; }
    ul, ol { padding-left: 22px; }
    li { margin: 4px 0; }
    .print-btn { position: fixed; top: 16px; right: 16px; background: #2e74c4; color: #fff; border: none; padding: 9px 15px; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 0.85rem; z-index: 10; }
    input[type=checkbox] { margin-right: 6px; }
    #loading { text-align: center; color: #8b9bb4; padding: 60px; }
    @media print {
      body { background: #fff; color: #000; }
      .print-btn { display: none; }
      h1,h2 { color: #000; } h3 { color: #333; } p,li,td { color: #222; }
      th { background: #eee; color: #000; } code,pre { background: #f3f3f3; color: #000; }
      blockquote { background: #fff8ec; color: #663; }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  <div class="wrap" id="content"><div id="loading">설명서를 불러오는 중…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script>
    // 같은 폴더의 사용설명서.md 를 읽어 HTML로 렌더(내용은 .md 한 곳에서만 관리).
    fetch('사용설명서.md', { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        document.title = '📖 운영 사용설명서 — 중2 탐험 레이스';
      })
      .catch(e => {
        document.getElementById('content').innerHTML =
          '<h1>설명서를 불러오지 못했습니다</h1><p>같은 폴더의 <code>사용설명서.md</code>가 필요합니다. (로컬에서 볼 땐 http 서버로 열어야 합니다 — 파일 더블클릭 ❌)</p><p>오류: ' + e.message + '</p>';
      });
  </script>
</body>
</html>
