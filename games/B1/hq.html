<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 대시보드 — 중2 탐험 레이스</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: #0f1424; color: #e6eefc; min-height: 100dvh; padding: 18px 14px; }
    .wrap { max-width: 820px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 8px; }
    header h1 { font-size: 1.4rem; color: #7dd3fc; }
    header p { color: #8b9bb4; font-size: 0.82rem; margin-top: 3px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 12px 0; }
    .controls a, .controls button { background: #1e2840; color: #cfe3ff; text-decoration: none; padding: 8px 13px; border-radius: 9px; font-size: 0.82rem; border: 1px solid #28365e; cursor: pointer; }
    .controls button.danger { background: rgba(233,69,96,.12); color: #ff8a9c; border-color: rgba(233,69,96,.4); }

    .section-title { font-size: 0.9rem; color: #7dd3fc; margin: 22px 0 10px; font-weight: bold; }
    .muted { color: #8b9bb4; font-size: 0.9rem; text-align: center; padding: 16px; }
    .alert-hot { background: rgba(233,69,96,.18); border: 1px solid #e94560; color: #ffb3bd; border-radius: 10px; padding: 12px 14px; margin: 10px 0; font-weight: 800; font-size: 0.92rem; line-height: 1.5; }
    .tc-meta.stale { color: #ff8a9c; font-weight: 800; }
    .offline { background: #2a1f15; border: 1px solid #7b4f12; border-radius: 12px; padding: 14px; color: #ffe8b3; font-size: 0.86rem; line-height: 1.6; }
    .offline b { color: #ffd166; }

    /* 우승 순위 */
    .rank { display: flex; flex-direction: column; gap: 7px; }
    .rank-row { display: flex; align-items: center; gap: 10px; background: #16213e; border-radius: 10px; padding: 10px 14px; }
    .rank-row.gold { background: linear-gradient(135deg,#3a2e00,#1c2336); border: 1px solid #ffd166; }
    .rank-medal { font-size: 1.2rem; width: 30px; text-align: center; }
    .rank-name { font-weight: 800; }
    .rank-time { margin-left: auto; color: #ffd166; font-size: 0.84rem; }

    /* 팀 카드 */
    .team-card { background: #16213e; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .tc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .tc-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .tc-name { font-weight: 800; font-size: 1.02rem; }
    .tc-meta { margin-left: auto; font-size: 0.76rem; color: #8b9bb4; }
    .tc-target { color: #ffd166; font-size: 0.9rem; margin-bottom: 8px; }
    .bar { background: #0f3460; border-radius: 8px; height: 13px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: #2ec4b6; transition: width .4s; }
    .tc-prog { font-size: 0.8rem; color: #b7e4c7; margin-top: 6px; }
    .tc-done { color: #ffd166; font-weight: bold; }
    /* 수동개입 */
    .ovr { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
    .ovr select { background: #0f1424; color: #e6eefc; border: 1px solid #28365e; border-radius: 7px; padding: 6px 8px; font-size: 0.8rem; flex: 1; min-width: 130px; }
    .ovr button { background: rgba(124,58,237,.15); color: #c4b5fd; border: 1px solid rgba(124,58,237,.5); border-radius: 7px; padding: 6px 11px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
    .ovr .ov-state { font-size: 0.74rem; color: #c4b5fd; }

    /* 장소 혼잡도 */
    .occ-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 8px; }
    .occ-cell { background: #16213e; border-radius: 10px; padding: 10px 12px; border-left: 4px solid #28365e; }
    .occ-cell.hot { border-left-color: #e94560; }
    .occ-cell.warm { border-left-color: #f4a261; }
    .occ-place { font-size: 0.84rem; color: #cfe3ff; }
    .occ-count { font-size: 1.3rem; font-weight: 900; margin-top: 3px; }
    .occ-count.zero { color: #5b6b8a; }

    details { background: #16213e; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    summary { cursor: pointer; color: #cfe3ff; font-size: 0.9rem; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #1e2840; vertical-align: top; }
    th { color: #7dd3fc; }
    .ans { color: #ffd166; font-weight: bold; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>📊 대시보드</h1>
      <p id="subt">중2 탐험 레이스 · 실시간 진행</p>
    </header>

    <div class="controls">
      <a href="admin.html" target="_blank">🛠️ 개발자 페이지</a>
      <a href="play.html?session=test__B1__sim__r01" target="_blank">🎮 테스트 플레이</a>
      <button id="msgBtn">📢 전체 공지</button>
      <button class="danger" id="endBtn">🏁 게임 종료·소집</button>
      <button class="danger" id="resetBtn">♻️ 진행 초기화</button>
    </div>

    <!-- 전체 공지/소집 패널 -->
    <div id="msgPanel" style="display:none; background:#16213e; border:1px solid #28365e; border-radius:12px; padding:14px; margin:10px 0;">
      <div style="font-size:0.86rem; color:#7dd3fc; font-weight:800; margin-bottom:8px;">📢 전체 학생 단말기로 보낼 메시지</div>
      <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;">
        <button class="quick-msg" data-q="⏰ 5분 남았어요! 마무리하세요.">⏰ 5분 남음</button>
        <button class="quick-msg" data-q="📣 본부로 모여주세요!">📣 본부 소집</button>
        <button class="quick-msg" data-q="✋ 잠깐 멈추고 안내를 들어주세요.">✋ 잠깐 멈춰</button>
      </div>
      <textarea id="msgText" rows="2" placeholder="보낼 메시지를 입력하세요" style="width:100%; background:#0f1424; color:#e6eefc; border:1px solid #28365e; border-radius:8px; padding:8px; font-size:0.9rem; resize:vertical;"></textarea>
      <div style="display:flex; gap:8px; margin-top:8px; align-items:center;">
        <button id="msgSend" style="background:#2e74c4; color:#fff; border:none; padding:8px 16px; border-radius:9px; font-weight:800; cursor:pointer;">📨 보내기</button>
        <button id="msgClear" style="background:#1e2840; color:#cfe3ff; border:1px solid #28365e; padding:8px 14px; border-radius:9px; cursor:pointer;">배너 내리기</button>
        <span id="msgState" style="font-size:0.8rem; color:#b7e4c7;"></span>
      </div>
    </div>

    <div id="alertBar"></div>

    <div class="section-title">🏁 12개 달성 순서 <span style="color:#8b9bb4;font-weight:normal;font-size:0.78rem">(참고용 — 실제 우승은 본부 도착 순, 선생님 판정)</span></div>
    <div id="rank"><div class="muted">아직 12개 달성한 조 없음</div></div>

    <div class="section-title">📡 실시간 조별 진행</div>
    <div id="live"><div class="muted">불러오는 중…</div></div>

    <div class="section-title">📊 장소 혼잡도 (지금 향하는 조 수)</div>
    <div id="occ" class="occ-grid"></div>

    <details>
      <summary>📚 전체 문제·정답 (커닝지) — 펼치기</summary>
      <div style="font-size:0.74rem;color:#8b9bb4;margin-top:6px">⚠️ 정답이 보입니다. 학생 근처에서 펼치지 마세요.</div>
      <div id="bank"></div>
    </details>
  </div>

  <script src="../../firebase-config.js"></script>
  <script src="results-config.js"></script>
  <!-- 대시보드는 ?session=login__B1__c2__r01 로 특정 게임 인스턴스에 연결된다. -->
  <script>window.SYNC_SESSION = null;</script>
  <script type="module" src="../../core/auth.js"></script>
  <script type="module" src="../../core/sync.js"></script>
  <script src="../../modes/B/engine.js"></script>
  <script>
  const E = window.BEngine;
  const COLORS = ['#e94560','#f4a261','#2ec4b6','#a8dadc','#b7e4c7','#ffb3c1','#7dd3fc','#c4b5fd','#ffd166','#90e0ef','#f6bd60','#84a98c'];
  let DATA, LIVE = {};

  E.loadStations(E.resolveSet()).then(data => {   // 세션/URL의 set으로 sets/{set}/stations.json 로드
    DATA = data;
    document.getElementById('subt').textContent = `${data.meta.title || '탐험 레이스'} · 전체 ${data.stations.length}곳 · 우승 ${E.winNeed(data)}곳`;
    renderBank();
    authGateDash(initSync);
  }).catch(e => { document.getElementById('live').innerHTML = `<div class="offline">데이터 로드 실패: ${e.message}</div>`; });

  // 로그인 게이트 — 학교 구글 계정(@snu.ms.kr) 통과해야 대시보드 표시
  function authGateDash(onReady) {
    let passed = false;
    const go = () => { if (passed) return; passed = true; onReady(); };
    const apply = () => {
      if (!window.BAuth || !window.BAuth.configured) { go(); return; }
      // 대시보드는 등록된 교사(화이트리스트)만. 일반 @snu 학생은 통과 못 함.
      window.BAuth.onChange(u => {
        if (u && window.BAuth.isAdmin(u.email)) go();
        else if (!passed) showDashLogin(u && !window.BAuth.isAdmin(u.email) ? u.email : null);
      });
    };
    if (window.BAUTH_READY) apply();
    else window.addEventListener('bauth-ready', apply, { once: true });
  }
  function showDashLogin(notAdminEmail) {
    document.getElementById('live').innerHTML = `<div class="offline" style="text-align:center">
      <b>교사 전용 — 로그인 필요</b><br>등록된 교사 계정(@snu.ms.kr)으로 로그인하세요.<br><br>
      <button id="dashLoginBtn" style="background:#2e74c4;color:#fff;border:none;padding:10px 18px;border-radius:9px;font-weight:800;cursor:pointer">🔑 학교 구글 로그인</button>
      <div id="dashLoginFb" style="margin-top:8px;color:#ff8a9c">${notAdminEmail ? '이 계정은 교사로 등록되지 않았습니다: ' + notAdminEmail : ''}</div></div>`;
    document.getElementById('dashLoginBtn').onclick = async () => {
      const fb = document.getElementById('dashLoginFb'); fb.textContent = '';
      try { const u = await window.BAuth.signIn(); if (!window.BAuth.isAdmin(u.email)) { fb.textContent = '교사로 등록되지 않은 계정입니다.'; await window.BAuth.signOut(); } }
      catch (e) { fb.textContent = e.message === 'DOMAIN' ? '학교 계정(@snu.ms.kr)만 가능' : '로그인 실패'; }
    };
  }

  function initSync() {
    const apply = () => {
      const online = !!(window.BSync && window.BSync.online);
      if (online) {
        document.getElementById('resetBtn').onclick = onReset;
        bindAnnounce();
        window.BSync.subscribeTeams(d => { LIVE = d || {}; renderAll(); });
      } else {
        document.getElementById('live').innerHTML = `<div class="offline"><b>오프라인 모드</b> — 실시간 진행이 비활성화됐어요.<br><code>firebase-config.js</code> 설정 시 켜집니다. (게임·출제는 정상 동작)</div>`;
        document.getElementById('resetBtn').disabled = true;
        document.getElementById('endBtn').disabled = true;
        renderOcc(); // 빈 혼잡도
      }
    };
    if (window.BSYNC_READY) apply();
    else window.addEventListener('bsync-ready', apply, { once: true });
    setTimeout(() => { if (!window.BSYNC_READY) apply(); }, 1500);
  }

  // 조별 최신(가장 앞선) 기록 + 기기수
  function agg() {
    const out = {};
    for (const team in LIVE) {
      const arr = Object.values(LIVE[team] || {});
      if (!arr.length) continue;
      const best = arr.reduce((a, b) => ((b.step || 0) > (a.step || 0) ? b : a));
      out[team] = { ...best, deviceCount: arr.length };
    }
    return out;
  }

  function renderAll() { renderAlert(); renderRank(); renderLive(); renderOcc(); }

  // 한 곳에 3팀 이상 몰리면 상단에 빨간 경고 → 선생님이 직접 분산 안내
  function renderAlert() {
    const a = agg(); const occ = {}; DATA.stations.forEach(s => occ[s.id] = 0);
    for (const t in a) { const x = a[t]; if (x.wonAt) continue; const tg = x.currentTarget; if (tg != null && tg !== '' && occ[tg] != null) occ[tg]++; }
    const hot = DATA.stations.filter(s => occ[s.id] >= 3).map(s => `${esc(s.place)} (${occ[s.id]}팀)`);
    const el = document.getElementById('alertBar');
    el.innerHTML = hot.length ? `<div class="alert-hot">🚨 몰림 주의 — ${hot.join(' · ')}<br>→ 한 조를 다른 곳으로 안내하거나, 아래에서 🛠 강제 이동하세요.</div>` : '';
  }

  function renderRank() {
    const a = agg();
    const winners = Object.keys(a).filter(t => a[t].wonAt).map(t => ({ team: t, wonAt: a[t].wonAt }))
      .sort((x, y) => x.wonAt - y.wonAt);
    const el = document.getElementById('rank');
    if (!winners.length) { el.innerHTML = '<div class="muted">아직 12개 달성한 조 없음</div>'; return; }
    const medal = ['🥇', '🥈', '🥉'];
    el.innerHTML = `<div class="rank">${winners.map((w, i) =>
      `<div class="rank-row ${i === 0 ? 'gold' : ''}"><span class="rank-medal">${medal[i] || (i + 1)}</span>
        <span class="rank-name">${esc(w.team)}</span>
        <span class="rank-time">12개 달성 ${new Date(w.wonAt).toLocaleTimeString('ko-KR')}</span></div>`).join('')}</div>`;
  }

  function renderLive() {
    const a = agg();
    const teams = (DATA.meta.teams && DATA.meta.teams.length) ? DATA.meta.teams : Object.keys(a);
    if (!teams.length) { document.getElementById('live').innerHTML = '<div class="muted">실시간 연결됨 — 조 진행 대기 중…</div>'; return; }
    const need = E.winNeed(DATA);
    document.getElementById('live').innerHTML = teams.map((team, i) => {
      const d = a[team]; const color = COLORS[i % COLORS.length];
      if (!d) return `<div class="team-card"><div class="tc-head"><span class="tc-dot" style="background:${color}"></span><span class="tc-name">${esc(team)}</span><span class="tc-meta">대기 중</span></div><div class="tc-prog" style="color:#5b6b8a">아직 시작 전</div></div>`;
      const solved = d.solvedCount || 0;
      const pct = Math.round((solved / need) * 100);
      const place = d.wonAt ? '🏆 복귀(완주)' : (d.placeName || '-');
      const prog = d.wonAt ? '<span class="tc-done">완주 🎉</span>' : `${solved} / ${need} 해결`;
      return `<div class="team-card">
        <div class="tc-head"><span class="tc-dot" style="background:${color}"></span><span class="tc-name">${esc(team)}</span>
          <span class="tc-meta${(d.ts && Date.now() - d.ts > 60000) ? ' stale' : ''}">${(d.ts && Date.now() - d.ts > 60000) ? '📵 ' : ''}기기 ${d.deviceCount} · ${timeAgo(d.ts)}</span></div>
        ${(d.myName || d.partnerName) ? `<div style="font-size:0.78rem;color:#9fd8c4;margin-bottom:6px">👤 ${esc(d.myName || '?')}${d.partnerName ? ' · ' + esc(d.partnerName) : ''}${d.email ? ` <span style="color:#5b6b8a">(${esc(d.email)})</span>` : ''}</div>` : ''}
        <div class="tc-target">📍 ${esc(place)}</div>
        <div class="bar"><span style="width:${Math.min(100, pct)}%"></span></div>
        <div class="tc-prog">${prog}</div>
        <div class="ovr">
          <select data-team="${esc(team)}">${DATA.stations.map(s => `<option value="${s.id}">${s.id}. ${esc(s.place || '')}</option>`).join('')}</select>
          <button data-ovr="${esc(team)}">🛠 강제 이동</button>
          <span class="ov-state" data-ovstate="${esc(team)}"></span>
        </div>
      </div>`;
    }).join('');
    // 수동개입 바인딩
    document.querySelectorAll('[data-ovr]').forEach(btn => {
      btn.onclick = () => {
        const team = btn.dataset.ovr;
        const sel = document.querySelector(`select[data-team="${cssEsc(team)}"]`);
        const sid = sel ? +sel.value : null;
        if (sid == null) return;
        if (window.BSync && window.BSync.setOverride) window.BSync.setOverride(team, sid);
        const st = document.querySelector(`[data-ovstate="${cssEsc(team)}"]`);
        if (st) { st.textContent = `→ ${sid}번 배정됨`; setTimeout(() => { st.textContent = ''; }, 2500); }
      };
    });
  }

  function renderOcc() {
    const a = agg();
    const occ = {};
    DATA.stations.forEach(s => { occ[s.id] = 0; });
    for (const team in a) {
      const t = a[team];
      if (t.wonAt) continue;
      const tgt = t.currentTarget;
      if (tgt != null && tgt !== '' && occ[tgt] != null) occ[tgt]++;
    }
    document.getElementById('occ').innerHTML = DATA.stations.map(s => {
      const c = occ[s.id];
      const cls = c >= 3 ? 'hot' : c === 2 ? 'warm' : '';
      return `<div class="occ-cell ${cls}"><div class="occ-place">${s.id}. ${esc(s.place || '')}</div><div class="occ-count ${c === 0 ? 'zero' : ''}">${c}팀</div></div>`;
    }).join('');
  }

  function renderBank() {
    const bank = document.getElementById('bank');
    bank.innerHTML = `<details><summary>전체 ${DATA.stations.length}문제 보기</summary>
      <table><tr><th>#</th><th>장소</th><th>문제</th><th>정답</th></tr>
      ${DATA.stations.map(s => `<tr><td>${s.id}</td><td>${esc(s.place || '')}</td><td>${esc((s.question || '').replace(/\n/g, ' '))}</td><td class="ans">${esc(Array.isArray(s.answer) ? s.answer.join(' / ') : (s.answer || ''))}</td></tr>`).join('')}
      </table></details>`;
    renderMath(bank);   // 커닝지 안 수식($\mathrm{...}$ 등) 렌더
  }

  // KaTeX 렌더(로딩 중이면 재시도). play.html과 동일 패턴.
  function renderMath(el, tries) {
    tries = tries || 0;
    if (window.renderMathInElement) {
      try { window.renderMathInElement(el, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: false }); } catch (e) {}
    } else if (tries < 25) {
      setTimeout(() => renderMath(el, tries + 1), 150);
    }
  }

  function onReset() {
    if (!confirm('⚠️ 모든 조의 진행 기록을 삭제하고, 학생 기기도 처음부터 다시 시작하게 합니다.\n실제 게임 중이면 누르지 마세요.\n계속할까요?')) return;
    if (window.BSync && window.BSync.resetTeams) window.BSync.resetTeams();   // 서버 teams/ 삭제(대시보드)
    if (window.BSync && window.BSync.sendReset) window.BSync.sendReset();     // 학생 기기 localStorage 강제 초기화 신호
  }

  // ── 전체 공지 / 게임 종료·소집 (대시보드 → 전체 학생 단말기, 거의 실시간) ──
  function bindAnnounce() {
    const panel = document.getElementById('msgPanel');
    const txt = document.getElementById('msgText');
    const state = document.getElementById('msgState');
    const flash = (m) => { state.textContent = m; setTimeout(() => { state.textContent = ''; }, 2500); };

    document.getElementById('msgBtn').onclick = () => {
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    };
    document.querySelectorAll('.quick-msg').forEach(b => {
      b.onclick = () => { txt.value = b.dataset.q; };
    });
    document.getElementById('msgSend').onclick = () => {
      const m = txt.value.trim();
      if (!m) { flash('메시지를 입력하세요'); return; }
      window.BSync.sendAnnounce(m, false);
      flash('✅ 전체 학생에게 보냈습니다');
    };
    document.getElementById('msgClear').onclick = () => {
      window.BSync.sendAnnounce(null, false);
      flash('배너를 내렸습니다');
    };
    // 게임 종료·소집: 결과 영구저장(+시트 기록) → 학생 화면 마감.
    document.getElementById('endBtn').onclick = async () => {
      if (!confirm('🏁 게임을 종료합니다.\n· 현재까지의 결과가 영구 저장되고 채점 시트에 기록됩니다.\n· 모든 학생 화면에 종료 안내가 떠 진행이 멈춥니다.\n\n⚠️ 종료를 눌러야 결과가 기록됩니다. 계속할까요?')) return;
      // 종료 메시지는 공지 입력칸과 무관하게 항상 고정('5분 남았어요' 같은 직전 공지가 딸려오지 않게).
      const m = '🏁 게임이 종료되었습니다. 본부로 모여주세요!';
      // 1) 먼저 마감 신호 → 신규 정답 유입 차단
      window.BSync.sendAnnounce(m, true);
      flash('🏁 결과 저장 중…');
      // 2) 잠시 대기 후 신선 데이터로 스냅샷(LIVE 캐시 race 방지)
      await new Promise(r => setTimeout(r, 1000));
      try {
        await saveGameResults();
        flash('✅ 결과 저장·시트 기록 완료');
      } catch (e) {
        flash('⚠️ ' + (e.message || '결과 저장 일부 실패'));
      }
    };
  }

  // 게임종료 결과 스냅샷 → Firebase results/ 영구저장 + 구글시트 POST.
  async function saveGameResults() {
    const session = (new URLSearchParams(location.search).get('session') || '');
    const parts = session.split('__');  // [mode, set, classSlug, rNN]
    const meta = { session, mode: parts[0] || '', gameSet: parts[1] || '', className: parts[2] || '', seq: (parts[3] || '').replace(/^r/, '') };

    // 신선 재조회 → 집계(조별 step 최고 기기 대표)
    const teams = await window.BSync.getTeamsOnce();
    const rows = [];
    for (const team in teams) {
      const arr = Object.values(teams[team] || {});
      if (!arr.length) continue;
      const best = arr.reduce((a, b) => ((b.step || 0) > (a.step || 0) ? b : a));
      rows.push({
        ...meta, team,
        myName: best.myName || '', partnerName: best.partnerName || '', email: best.email || '',
        solvedCount: best.solvedCount || 0, total: best.total || DATA.stations.length, need: best.need || E.winNeed(DATA),
        won: !!best.wonAt, wonAt: best.wonAt || null, endedAt: Date.now(),
      });
    }
    if (!rows.length) throw new Error('저장할 조 결과가 없습니다(오프라인이거나 참가 없음).');

    // ① Firebase 영구저장(안전망 — 우선)
    await window.BSync.saveResults(rows);

    // ② 구글시트 기록(best-effort — 실패해도 Firebase엔 남음)
    if (window.RESULTS_SHEET_WEBAPP) {
      const idToken = await window.BSync.getIdToken();
      const res = await fetch(window.RESULTS_SHEET_WEBAPP, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },  // 프리플라이트 회피
        body: JSON.stringify({ idToken, session, rows }),
        redirect: 'follow',
      });
      const data = await res.json().catch(() => ({}));
      if (!data.ok) throw new Error('시트 기록 실패(결과는 저장됨): ' + (data.error || 'unknown'));
    }
  }

  function timeAgo(ts) { if (!ts) return ''; const s = Math.max(0, Math.round((Date.now() - ts) / 1000)); if (s < 60) return s + '초 전'; const m = Math.round(s / 60); return m < 60 ? m + '분 전' : Math.round(m / 60) + '시간 전'; }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function cssEsc(s) { return String(s).replace(/"/g, '\\"'); }
  </script>
</body>
