<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 게임 시작 QR (진행자 전용)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #0f1424; color: #fff;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    h1 { font-size: clamp(1.6rem, 5vw, 2.6rem); color: #ffd166; margin-bottom: 6px; }
    .sub { color: #a8b3c8; font-size: clamp(0.95rem, 2.6vw, 1.3rem); margin-bottom: 28px; line-height: 1.5; }
    .qr-frame {
      background: #fff; padding: clamp(16px, 3vw, 32px); border-radius: 20px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.45);
    }
    .qr-frame img, .qr-frame canvas { display: block; }
    .url { margin-top: 22px; color: #7dd3fc; font-size: clamp(0.85rem, 2.2vw, 1.1rem); word-break: break-all; }
    .steps {
      margin-top: 30px; max-width: 560px; text-align: left;
      background: #16213e; border-radius: 14px; padding: 18px 22px; font-size: 0.95rem; line-height: 1.7; color: #cfe3ff;
    }
    .steps b { color: #ffd166; }
    .err { color: #ff8a9c; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🚀 게임 시작 QR</h1>
  <p class="sub">아이들에게 이 QR을 보여주세요.<br>조별로 QR을 찍으면 게임 안내가 시작됩니다.</p>

  <div class="qr-frame" id="qrFrame"></div>
  <div class="url" id="urlText"></div>

  <div class="steps">
    <b>진행 순서</b><br>
    ① 이 화면을 큰 화면(노트북·빔프로젝터)에 띄웁니다.<br>
    ② 규칙을 설명한 뒤 → 조별로 위 QR을 찍게 합니다.<br>
    ③ 아이들 폰에 규칙 → 조 선택 → 첫 장소 안내가 차례로 나타납니다.
  </div>

  <script src="qrcode.min.js"></script>
  <script>
    // QR이 연결되는 곳 = 일반 게임 시작 페이지(규칙 화면부터)
    // 현재 host.html이 놓인 사이트 주소를 기준으로 index.html?fresh=1 을 만든다.
    const base = location.origin + location.pathname.replace(/[^/]*$/, '');
    const targetUrl = base + 'index.html?fresh=1';
    const frame = document.getElementById('qrFrame');
    document.getElementById('urlText').textContent = targetUrl;
    if (typeof QRCode === 'undefined') {
      frame.innerHTML = '<div class="err">QR 라이브러리를 불러오지 못했습니다.</div>';
    } else {
      // 화면 크기에 맞춰 큰 QR (최대 420px)
      const size = Math.min(420, Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.6));
      new QRCode(frame, {
        text: targetUrl, width: size, height: size,
        colorDark: '#0f1424', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M,
      });
    }
  </script>
</body>
</html>
