<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧭 인솔자 매뉴얼 — 조별 정답지</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif; background: #ece6d8; color: #2a2218; line-height: 1.55; padding: 16px; }
    .wrap { max-width: 680px; margin: 0 auto; }

    h1 { font-size: 1.25rem; color: #5c3a12; text-align: center; margin-bottom: 4px; }
    .lead { text-align: center; font-size: 0.85rem; color: #8a7a55; margin-bottom: 14px; }
    .warn { text-align: center; font-size: 0.8rem; color: #b23; background: #fbe9e7; border: 1px solid #f0c4bd; border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; }

    /* 상단 5조 버튼 */
    .team-tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
    .team-tab {
      padding: 16px 4px; border-radius: 12px; border: 2px solid #c9bfa8;
      background: #fff; color: #5c3a12; font-size: 1.15rem; font-weight: 900;
      cursor: pointer; text-align: center; transition: transform .1s;
    }
    .team-tab:active { transform: scale(0.96); }
    .team-tab.active { background: #6b3410; color: #fff; border-color: #6b3410; box-shadow: 0 3px 10px rgba(107,52,16,0.35); }
    @media (max-width: 480px) { .team-tab { font-size: 1rem; padding: 14px 2px; } }

    .hint-pick { text-align: center; color: #8a7a55; font-size: 0.95rem; padding: 40px 0; }

    /* 조 패널 */
    .route { background: #f3ead6; border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; font-size: 0.92rem; }
    .route b { color: #6b3410; }
    .route .seq { font-weight: bold; line-height: 1.8; }

    .mission { border: 1px solid #d6cbb0; border-radius: 12px; margin-bottom: 16px; overflow: hidden; background: #fff; }
    .m-head { background: #efe6d0; padding: 10px 14px; display: flex; align-items: center; gap: 9px; }
    .m-no { background: #6b3410; color: #fff; width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; flex: 0 0 auto; }
    .m-place { font-weight: bold; font-size: 1.08rem; }
    .m-meta { margin-left: auto; font-size: 0.78rem; color: #8a7a55; }
    .m-piece { background: #2d6010; color: #fff; border-radius: 5px; padding: 2px 9px; font-weight: bold; font-size: 0.85rem; }
    .m-body { padding: 12px 14px; }
    .m-guide { font-size: 0.83rem; color: #8a5a20; background: #fff7e8; border-left: 3px solid #c8901a; padding: 6px 10px; border-radius: 4px; margin-bottom: 12px; }
    .m-final { font-size: 1.0rem; margin-bottom: 12px; }
    .m-final b { color: #c0392b; font-size: 1.3rem; font-weight: 900; background: #fbe9e7; padding: 2px 10px; border-radius: 5px; }

    /* 실제 문제 (학생이 보는 그대로) */
    .q { border-top: 1px dashed #e0d6bd; padding: 12px 0; }
    .q:first-child { border-top: none; }
    .q-tag { display: inline-block; font-size: 0.78rem; font-weight: bold; color: #fff; background: #8a7a55; border-radius: 4px; padding: 1px 8px; margin-bottom: 6px; }
    .q-media { margin: 8px 0; text-align: center; }
    .q-media img { max-width: 220px; max-height: 200px; width: auto; height: auto; border-radius: 8px; border: 1px solid #ddd; }
    .q-media .video { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 16/9; }
    .q-media iframe { width: 100%; height: 100%; border: 0; border-radius: 8px; }
    .q-text { font-size: 0.95rem; color: #33291a; white-space: pre-line; margin-bottom: 6px; }
    .q-hint { font-size: 0.83rem; color: #7a6a45; background: #faf5e8; border-radius: 5px; padding: 5px 9px; margin-top: 4px; }
    .q-hint b { color: #5c3a12; }
    .q-ans {
      display: inline-block; margin-top: 8px; font-size: 1.0rem; font-weight: 900;
      color: #c0392b; background: #fbe9e7; padding: 3px 12px; border-radius: 6px;
    }
    .q-ans .combo { font-weight: 700; font-size: 0.85rem; }

    .finale { margin-top: 18px; background: #6b3410; color: #fff; border-radius: 10px; padding: 14px 18px; }
    .finale .lbl { font-size: 0.82rem; opacity: 0.85; }
    .finale .ans { font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; margin-top: 3px; }
    .finale .desc { font-size: 0.83rem; margin-top: 8px; opacity: 0.92; line-height: 1.55; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧭 인솔자 매뉴얼</h1>
    <p class="lead">자신이 따라다니는 조의 버튼을 누르세요</p>
    <div class="warn">⚠️ 정답 포함 — 아이들에게 보이지 마세요. 막히면 힌트부터, 그래도 모르면 정답을 알려주세요.</div>

    <div class="team-tabs" id="tabs"></div>
    <div id="panel"><div class="hint-pick">👆 위에서 우리 조를 선택하세요</div></div>
  </div>

  <script src="app.js"></script>
  <script>
    let COURSE, QUESTIONS;
    const Q = id => QUESTIONS.find(x => String(x.id) === String(id));
    const mBySet = s => COURSE.missions.find(m => m.set === s);

    function youtubeEmbedLocal(url) {
      const s = String(url || '').trim(); if (!s) return '';
      if (s.indexOf('/embed/') !== -1) return s;
      let id = '';
      const m1 = s.match(/[?&]v=([\w-]{6,})/), m2 = s.match(/youtu\.be\/([\w-]{6,})/), m3 = s.match(/\/shorts\/([\w-]{6,})/);
      if (m1) id = m1[1]; else if (m2) id = m2[1]; else if (m3) id = m3[1]; else if (/^[\w-]{6,}$/.test(s)) id = s;
      return id ? 'https://www.youtube.com/embed/' + id : '';
    }
    function mediaHtml(q) {
      return (q.media || []).map(md => {
        if (md.type === 'image' && md.url) return `<div class="q-media"><img src="${md.url}" alt=""></div>`;
        if (md.type === 'youtube') { const src = youtubeEmbedLocal(md.url); return src ? `<div class="q-media"><div class="video"><iframe src="${src}" allowfullscreen></iframe></div></div>` : ''; }
        return '';
      }).join('');
    }

    const modeLabel = m => m.mode === 'clue' ? `단서 ${m.qids.length}개 모아 추리` : m.mode === 'common' ? '다같이 푸는 1문제' : `${m.qids.length}명 협력 조합`;

    function missionHtml(setNo, idx) {
      const m = mBySet(setNo);
      const finalAns = Array.isArray(m.answer) ? m.answer.join(' / ') : m.answer;
      const qRows = m.qids.map((qid, i) => {
        const q = Q(qid); if (!q) return '';
        const body = q.question || q.clue || '';
        const tag = m.mode === 'clue' ? `단서 ${i+1}` : (m.qids.length === 1 ? '문제' : `#${i+1}번`);
        const hints = (q.hints || []).map((h, hi) => `<div class="q-hint"><b>힌트${hi+1}</b> ${h}</div>`).join('');
        let ans = '';
        if (m.mode !== 'clue' && q.answer) {
          const combo = (q.combined && q.combined !== q.answer) ? ` <span class="combo">(합본: ${q.combined})</span>` : '';
          ans = `<div><span class="q-ans">정답: ${q.answer}${combo}</span></div>`;
        }
        return `<div class="q">
          <span class="q-tag">${tag}</span>
          ${mediaHtml(q)}
          <div class="q-text">${body}</div>
          ${hints}
          ${ans}
        </div>`;
      }).join('');
      return `<div class="mission">
        <div class="m-head"><span class="m-no">${idx+1}</span><span class="m-place">${m.placeName}</span><span class="m-meta">${modeLabel(m)}</span><span class="m-piece">🔑 ${m.piece}</span></div>
        <div class="m-body">
          ${m.inputGuide ? `<div class="m-guide">📝 ${m.inputGuide}</div>` : ''}
          ${finalAns ? `<div class="m-final">✅ 이 미션 정답: <b>${finalAns}</b></div>` : ''}
          ${qRows}
        </div>
      </div>`;
    }

    function showTeam(team) {
      document.querySelectorAll('.team-tab').forEach(b => b.classList.toggle('active', b.dataset.team === team));
      const order = teamMissionOrder(COURSE, team);
      const routeNames = order.map((s, i) => `${i+1}. ${mBySet(s).placeName.split('(')[0].trim()}`).join('  →  ');
      const missions = order.map((s, i) => missionHtml(s, i)).join('');
      const fin = COURSE.finale || {};
      document.getElementById('panel').innerHTML = `
        <div class="route"><b>📍 ${team} 동선</b><br><span class="seq">${routeNames}</span></div>
        ${missions}
        <div class="finale">
          <div class="lbl">💎 모든 글자(🔑)를 모으면 — 최종 보물 암호</div>
          <div class="ans">${fin.answer || ''}</div>
          <div class="desc">${(fin.reveal || '').replace(/\n/g, ' ')}</div>
        </div>`;
      window.scrollTo(0, 0);
    }

    loadData().then(({ course, questions }) => {
      COURSE = course; QUESTIONS = questions;
      document.getElementById('tabs').innerHTML = course.teams
        .map(t => `<button class="team-tab" data-team="${t}">${t}</button>`).join('');
      document.querySelectorAll('.team-tab').forEach(b => b.onclick = () => showTeam(b.dataset.team));
    });
  </script>
</body>
</html>
