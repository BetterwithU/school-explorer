<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>보물 발견!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #2c1f0e;
      color: #2c1a05;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(220,185,120,0.4) 0%, transparent 60%),
        linear-gradient(160deg, #e8d5a3 0%, #dcc48a 40%, #d4b870 100%);
      z-index: 0;
    }

    /* 폭죽 파티클 */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .c {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: fall var(--d,3s) linear var(--delay,0s) infinite;
      opacity: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* 트로피 */
    .trophy-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 12px;
    }
    .trophy {
      font-size: 5.5rem;
      display: inline-block;
      animation: trophy-pop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      filter: drop-shadow(0 0 24px rgba(255,209,102,0.8));
    }
    @keyframes trophy-pop {
      0% { transform: scale(0) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .trophy-glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(ellipse, rgba(255,209,102,0.25) 0%, transparent 70%);
      animation: glow-pulse 2s ease-in-out infinite;
      z-index: -1;
    }
    @keyframes glow-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    h1 {
      position: relative;
      z-index: 1;
      font-size: 2rem;
      color: #5c2e05;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 rgba(255,240,200,0.5);
      animation: slide-up 0.5s ease 0.3s both;
    }
    .team-name {
      position: relative;
      z-index: 1;
      font-size: 1.4rem;
      color: #7a3a10;
      font-weight: bold;
      margin-bottom: 8px;
      animation: slide-up 0.5s ease 0.4s both;
    }
    p {
      position: relative;
      z-index: 1;
      color: rgba(60,30,5,0.7);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 20px;
      animation: slide-up 0.5s ease 0.5s both;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    .treasure {
      position: relative;
      z-index: 1;
      background: rgba(100,65,20,0.1);
      border: 1px solid rgba(130,80,20,0.45);
      border-radius: 6px;
      padding: 22px 18px;
      max-width: 420px;
      width: 100%;
      margin-bottom: 16px;
      box-shadow: 2px 3px 12px rgba(60,30,5,0.2);
      animation: slide-up 0.5s ease 0.6s both;
    }
    .treasure .lbl { font-size: 0.8rem; color: #7a3a10; margin-bottom: 8px; letter-spacing: 1px; }
    .treasure .place { font-size: 1.8rem; font-weight: bold; color: #5c2e05; letter-spacing: 1px; margin-bottom: 10px; }
    .treasure .reveal { font-size: 0.92rem; color: rgba(60,30,5,0.75); line-height: 1.6; }

    .summary {
      position: relative;
      z-index: 1;
      background: rgba(245,235,200,0.6);
      border: 1px solid rgba(100,65,20,0.3);
      border-radius: 6px;
      padding: 20px;
      max-width: 420px;
      width: 100%;
      margin-bottom: 24px;
      animation: slide-up 0.5s ease 0.7s both;
    }
    .summary .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.95rem; border-bottom: 1px solid rgba(100,65,20,0.15); }
    .summary .row:last-child { border-bottom: none; }
    .summary .row .k { color: rgba(60,30,5,0.65); }
    .summary .row .v { color: #5c2e05; font-weight: bold; }

    .btn {
      position: relative;
      z-index: 1;
      display: block;
      max-width: 420px;
      width: 100%;
      background: linear-gradient(135deg, #8b4513 0%, #6b3410 100%);
      color: #f5deb3;
      text-decoration: none;
      padding: 16px;
      border-radius: 4px;
      font-size: 1.05rem;
      font-weight: bold;
      box-shadow: 2px 3px 8px rgba(60,30,5,0.3);
      animation: slide-up 0.5s ease 0.8s both;
      transition: transform 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    @media (hover: hover) { .btn:hover { background: linear-gradient(135deg, #a0521a 0%, #7a3d12 100%); } }
  </style>
</head>
<body>

  <div class="confetti-wrap" id="confettiWrap"></div>

  <div class="trophy-wrap">
    <div class="trophy-glow"></div>
    <div class="trophy">🏆</div>
  </div>

  <h1 id="title">보물을 찾았다!</h1>
  <div class="team-name" id="teamName"></div>
  <p id="lead">학교 구석구석을 탐험하며<br>모든 미션을 해결하고 보물 암호까지 풀었어요!</p>

  <div class="treasure" id="treasure"></div>
  <div class="summary" id="summary"></div>

  <a class="btn" href="index.html">🏕️ 처음으로</a>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script type="module" src="sync.js"></script>
  <script>
    // 폭죽 생성
    (function() {
      const colors = ['#ffd166','#e94560','#39ff8f','#a8dadc','#ff9aaa','#fff'];
      const wrap = document.getElementById('confettiWrap');
      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.className = 'c';
        const color = colors[Math.floor(Math.random() * colors.length)];
        c.style.cssText = `
          left:${Math.random()*100}%;
          background:${color};
          width:${Math.random()*8+4}px;
          height:${Math.random()*8+4}px;
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          --d:${(Math.random()*3+2).toFixed(1)}s;
          --delay:${(Math.random()*3).toFixed(1)}s;
        `;
        wrap.appendChild(c);
      }
    })();

    loadData().then(({ course }) => {
      const p = loadProgress();
      if (!p || !p.team) { location.href = 'index.html'; return; }

      if (isFinalePending(course, p)) { location.href = 'map.html'; return; }

      reportProgress(course, p);
      document.getElementById('teamName').textContent = `🎉 ${p.team} 🎉`;

      const f = course.finale || {};
      if (p.finaleSolved && f.answer) {
        document.getElementById('treasure').innerHTML = `
          <div class="lbl">💎 보물이 숨겨진 곳</div>
          <div class="place">${f.answer}</div>
          <div class="reveal">${f.reveal || '선생님께 가서 보물을 찾았다고 외치세요!'}</div>`;
      } else {
        document.getElementById('treasure').style.display = 'none';
      }

      const total = p.order.length;
      const solved = Object.keys(p.solved).length;
      document.getElementById('summary').innerHTML = `
        <div class="row"><span class="k">우리 조</span><span class="v">${p.team}</span></div>
        <div class="row"><span class="k">해결한 미션</span><span class="v">${solved} / ${total}</span></div>
        <div class="row"><span class="k">보물 암호</span><span class="v">${p.finaleSolved ? '해독 완료 ✅' : '미해독'}</span></div>
      `;
    });
  </script>
</body>
</html>
