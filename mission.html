<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미션</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #2c1f0e;
      color: #2c1a05;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* 양피지 배경 텍스처 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(210,175,110,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(180,140,80,0.2) 0%, transparent 60%),
        linear-gradient(160deg, #e8d5a3 0%, #dcc48a 40%, #d4b870 100%);
      z-index: -1;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(245,235,200,0.82);
      border: 2px solid rgba(100,65,20,0.4);
      border-radius: 6px;
      padding: 24px 20px;
      max-width: 480px;
      width: 100%;
      box-shadow: 3px 4px 18px rgba(60,30,5,0.25), inset 0 0 30px rgba(180,140,70,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(100,65,20,0.25);
      font-size: 0.85rem;
    }
    .topbar .team { color: #5c2e05; font-weight: bold; }
    .topbar .step { color: rgba(80,50,15,0.65); }
    .dev-badge { background: #7c3aed; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }

    .badge-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .badge {
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: bold;
      border: 1px solid rgba(100,65,20,0.35);
      background: rgba(100,65,20,0.08);
      color: rgba(60,30,5,0.85);
    }
    .badge-pair { background: rgba(160,50,30,0.1); border-color: rgba(160,50,30,0.4); color: rgba(140,40,20,0.9); }
    .badge-place { background: rgba(60,100,40,0.1); border-color: rgba(60,100,40,0.35); color: rgba(40,80,20,0.85); }

    .question-text {
      font-size: 1.15rem;
      line-height: 1.8;
      margin-bottom: 18px;
      white-space: pre-line;
      color: #2c1a05;
    }

    .q-media { margin-bottom: 16px; width: 100%; }
    .q-image { max-width: 60%; max-height: 220px; width: auto; height: auto; border-radius: 6px; display: inline-block; border: 1px solid rgba(100,65,20,0.3); object-fit: contain; margin: 0 auto; }
    .q-video { position: relative; width: 100%; padding-top: 56.25%; border-radius: 6px; overflow: hidden; background: #000; }
    .q-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .q-audio { width: 100%; display: block; }

    .pair-note {
      background: rgba(130,60,10,0.08);
      border: 2px solid rgba(160,70,20,0.5);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      color: rgba(60,30,5,0.85);
      line-height: 1.75;
    }
    .pair-note b { color: #7a3a10; }
    .pair-note .warn {
      display: block;
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 900;
      color: #cc3300;
      background: rgba(200,50,0,0.08);
      border-radius: 4px;
      padding: 6px 10px;
      text-align: center;
    }

    .hint-btn {
      background: rgba(100,65,20,0.08);
      border: 1px solid rgba(100,65,20,0.3);
      color: rgba(80,50,15,0.75);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      display: inline-block;
      width: auto;
      margin-bottom: 14px;
      transition: background 0.2s;
    }
    .hint-btn:active { background: rgba(100,65,20,0.16); }
    @media (hover: hover) { .hint-btn:hover { background: rgba(100,65,20,0.16); } }

    /* 힌트 팝업 오버레이 */
    .hint-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(40,20,5,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .hint-overlay.active { display: flex; }
    .hint-popup {
      background: #f5ead0;
      border: 2px solid rgba(100,65,20,0.4);
      border-radius: 10px;
      padding: 22px 20px;
      max-width: 360px;
      width: 100%;
      box-shadow: 3px 4px 20px rgba(40,20,5,0.35);
      position: relative;
    }
    .hint-popup-title {
      font-size: 0.82rem;
      color: rgba(80,50,15,0.6);
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    .hint-popup-item {
      background: rgba(100,65,20,0.07);
      border-left: 3px solid rgba(130,80,20,0.5);
      border-radius: 3px;
      padding: 9px 12px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: rgba(50,25,5,0.85);
      line-height: 1.6;
    }
    .hint-popup-close {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: rgba(100,65,20,0.1);
      border: 1px solid rgba(100,65,20,0.3);
      border-radius: 4px;
      font-size: 0.85rem;
      color: rgba(80,50,15,0.8);
      cursor: pointer;
      text-align: center;
    }

    .hint-box {
      background: rgba(100,65,20,0.07);
      border: 1px solid rgba(100,65,20,0.2);
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 10px;
      color: rgba(60,30,5,0.75);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .combined-label {
      font-size: 1.05rem;
      color: #cc3300;
      margin: 14px 0 8px;
      font-weight: 900;
      padding: 8px 12px;
      background: rgba(200,50,0,0.07);
      border-radius: 4px;
      border-left: 3px solid #cc3300;
    }

    /* 내 답 메모 (협력 미션 전용, 채점 무관) */
    .note-box {
      background: rgba(60,100,40,0.06);
      border: 1px dashed rgba(60,100,40,0.45);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .note-label { font-size: 0.85rem; color: #2d6010; font-weight: bold; margin-bottom: 8px; }
    .note-label small { display: block; font-weight: normal; color: rgba(40,80,20,0.7); font-size: 0.75rem; margin-top: 2px; }
    .note-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 4px;
      border: 1px solid rgba(60,100,40,0.4);
      background: rgba(255,253,240,0.8);
      color: #2c1a05;
      font-size: 1.05rem;
      text-align: center;
    }
    .note-input:focus { outline: none; border-color: rgba(60,100,40,0.7); }
    .note-input::placeholder { color: rgba(60,100,40,0.4); font-size: 0.9rem; }
    .note-saved { font-size: 0.75rem; color: #2d6010; text-align: right; margin-top: 4px; min-height: 1em; }

    .answer-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 4px;
      border: 1px solid rgba(100,65,20,0.45);
      background: rgba(255,248,225,0.7);
      color: #2c1a05;
      font-size: 1.15rem;
      margin-bottom: 14px;
      text-align: center;
    }
    .answer-input:focus {
      outline: none;
      border-color: rgba(130,70,20,0.7);
      background: rgba(255,250,230,0.9);
    }
    .answer-input::placeholder { color: rgba(100,65,20,0.4); font-size: 0.95rem; }

    .submit-btn {
      background: linear-gradient(135deg, #8b4513 0%, #6b3410 100%);
      border: none;
      color: #f5deb3;
      padding: 14px;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: transform 0.15s;
      box-shadow: 2px 3px 8px rgba(60,30,5,0.3);
    }
    .submit-btn:active { transform: scale(0.97); }
    @media (hover: hover) { .submit-btn:hover { background: linear-gradient(135deg, #a0521a 0%, #7a3d12 100%); } }

    .feedback { margin-top: 12px; padding: 12px; border-radius: 4px; text-align: center; font-size: 0.95rem; display: none; }
    .feedback.wrong { background: rgba(160,50,30,0.1); border: 1px solid rgba(160,50,30,0.4); color: #8b2010; display: block; }
    .feedback.right { background: rgba(60,100,40,0.1); border: 1px solid rgba(60,100,40,0.4); color: #2d6010; display: block; }

    .qr-btn {
      display: block; width: 100%; margin-bottom: 14px;
      padding: 11px; border-radius: 4px; font-size: 0.9rem; font-weight: bold;
      cursor: pointer; text-align: center; border: none;
      background: linear-gradient(135deg, #4a7a3a 0%, #2d5c20 100%);
      color: #e8f5d8;
      box-shadow: 2px 3px 8px rgba(30,60,10,0.3);
      transition: transform 0.15s;
    }
    .qr-btn:active { transform: scale(0.97); }
    @media (hover: hover) { .qr-btn:hover { background: linear-gradient(135deg, #5a8a48 0%, #3a6c2c 100%); } }

    /* 안내 화면 */
    .guide { text-align: center; }
    .guide .ico { font-size: 2.4rem; margin-bottom: 10px; }
    .guide .ttl { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; color: #7a3a10; }
    .guide .place {
      background: rgba(100,65,20,0.08);
      border: 1px solid rgba(100,65,20,0.3);
      border-radius: 6px;
      padding: 16px;
      margin: 14px 0;
    }
    .guide .place .lbl { font-size: 0.75rem; color: rgba(80,50,15,0.65); letter-spacing: 1px; }
    .guide .place .nm { font-size: 1.45rem; font-weight: bold; color: #5c2e05; margin-top: 4px; }

    .share-box {
      background: rgba(130,80,20,0.1);
      border: 1px solid rgba(130,80,20,0.35);
      border-radius: 6px;
      padding: 14px;
      margin: 8px 0 4px;
    }
    .share-box .share-lbl { font-size: 0.78rem; color: #7a3a10; margin-bottom: 6px; }
    .share-box .share-ans { font-size: 1.7rem; font-weight: bold; color: #2c1a05; letter-spacing: 3px; }

    .piece-box {
      background: rgba(60,100,40,0.08);
      border: 1px solid rgba(60,100,40,0.3);
      border-radius: 6px;
      padding: 14px;
      margin: 8px 0;
    }
    .piece-box .piece-lbl { font-size: 0.78rem; color: rgba(40,80,20,0.8); margin-bottom: 6px; }
    .piece-box .piece-char { font-size: 2.4rem; font-weight: bold; color: #5c2e05; }

    .guide .desc { color: rgba(60,30,5,0.7); font-size: 0.88rem; line-height: 1.7; white-space: pre-line; }

    .guide .btn, .scan-guide-btn {
      display: block;
      background: rgba(100,65,20,0.1);
      border: 1px solid rgba(100,65,20,0.35);
      color: #5c2e05;
      text-decoration: none;
      padding: 12px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 0.92rem;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: background 0.2s;
    }
    .guide .btn:active, .scan-guide-btn:active { background: rgba(100,65,20,0.18); }
    @media (hover: hover) {
      .guide .btn:hover, .scan-guide-btn:hover { background: rgba(100,65,20,0.18); }
    }

    /* QR 스캔 버튼 — 강조 */
    .scan-guide-btn.primary {
      background: linear-gradient(135deg, #8b4513 0%, #6b3410 100%);
      border-color: transparent;
      color: #f5deb3;
      font-weight: bold;
      font-size: 1rem;
      padding: 14px;
      box-shadow: 2px 3px 8px rgba(60,30,5,0.25);
      margin-top: 14px;
    }
    .scan-guide-btn.primary:active { transform: scale(0.97); }

    .back-link {
      display: block;
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 12px;
      color: rgba(100,65,20,0.55);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 8px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
    }
    .back-link:active { color: #7a3a10; }
    @media (hover: hover) { .back-link:hover { color: #7a3a10; } }

    /* 자동 이동 카운트다운 */
    .redirect-bar {
      margin-top: 16px;
      font-size: 0.82rem;
      color: rgba(100,65,20,0.6);
      text-align: center;
    }
    .redirect-bar span { font-weight: bold; color: #7a3a10; }

    /* ── QR 스캐너 오버레이 ── */
    .scanner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,10,0,0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .scanner-overlay.active { display: flex; }
    .scanner-title { color: #f5deb3; font-size: 1.05rem; font-weight: bold; margin-bottom: 16px; }
    #qr-video {
      width: min(90vw, 360px); height: min(90vw, 360px);
      object-fit: cover; border-radius: 8px;
      border: 2px solid rgba(139,69,19,0.8);
    }
    .scanner-frame {
      position: relative;
      width: min(90vw, 360px); height: min(90vw, 360px);
    }
    .scanner-corner {
      position: absolute; width: 24px; height: 24px;
      border-color: #c8a050; border-style: solid; border-width: 0;
    }
    .scanner-corner.tl { top: 6px; left: 6px; border-top-width: 3px; border-left-width: 3px; }
    .scanner-corner.tr { top: 6px; right: 6px; border-top-width: 3px; border-right-width: 3px; }
    .scanner-corner.bl { bottom: 6px; left: 6px; border-bottom-width: 3px; border-left-width: 3px; }
    .scanner-corner.br { bottom: 6px; right: 6px; border-bottom-width: 3px; border-right-width: 3px; }
    .scanner-line {
      position: absolute; left: 10px; right: 10px; height: 2px;
      background: linear-gradient(90deg, transparent, #c8a050, transparent);
      animation: scan-line 2s linear infinite; top: 0;
    }
    @keyframes scan-line {
      0%   { top: 10px; opacity: 1; }
      90%  { top: calc(100% - 10px); opacity: 1; }
      100% { top: calc(100% - 10px); opacity: 0; }
    }
    .scanner-msg { color: #c8a050; font-size: 0.88rem; margin-top: 14px; text-align: center; line-height: 1.6; }
    .scanner-cancel {
      margin-top: 20px; padding: 12px 36px;
      background: rgba(100,65,20,0.3); color: #f5deb3;
      border: 1px solid rgba(139,69,19,0.5); border-radius: 6px;
      font-size: 0.95rem; cursor: pointer;
    }
    #qr-canvas { display: none; }

    /* 게임 off 안내 (캠핑) */
    .camp-screen { text-align: center; }
    .camp-screen img {
      width: 100%; max-width: 320px; height: auto;
      border-radius: 10px;
      box-shadow: 3px 4px 18px rgba(40,20,5,0.3);
    }
  </style>
</head>
<body>
  <div class="card" id="card"><p style="text-align:center;color:rgba(100,65,20,0.6)">불러오는 중...</p></div>

  <!-- QR 스캐너 오버레이 -->
  <div class="scanner-overlay" id="scannerOverlay">
    <div class="scanner-title">📜 QR 코드를 비춰주세요</div>
    <div class="scanner-frame">
      <video id="qr-video" autoplay playsinline muted></video>
      <div class="scanner-corner tl"></div>
      <div class="scanner-corner tr"></div>
      <div class="scanner-corner bl"></div>
      <div class="scanner-corner br"></div>
      <div class="scanner-line"></div>
    </div>
    <canvas id="qr-canvas"></canvas>
    <p class="scanner-msg" id="scannerMsg">QR코드를 화면 안에 맞춰주세요</p>
    <button class="scanner-cancel" id="scannerCancel">✕ 취소</button>
  </div>

  <!-- 힌트 팝업 오버레이 -->
  <div class="hint-overlay" id="hintOverlay">
    <div class="hint-popup" id="hintPopup">
      <div class="hint-popup-title">💡 힌트</div>
      <div id="hintPopupItems"></div>
      <button class="hint-popup-close" id="hintPopupClose">닫기</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script type="module" src="sync.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const scannedQid = params.get('q');
    const DEV = params.get('dev') === '1';

    let COURSE, QUESTIONS, PROGRESS, QUESTION, MISSION;
    let hintsShown = 0;
    let scanStream = null, scanRAF = null, scanDone = false;

    loadData().then(({ course, questions }) => {
      COURSE = course; QUESTIONS = questions;
      PROGRESS = loadProgress();
      gateByGameState();
      reportProgress(COURSE, PROGRESS);
    });

    /* ── 게임 on/off 게이트 ──
     * Firebase가 켜져 있고 게임이 off면 → QR 스캔해도 캠핑 안내만.
     * Firebase 꺼짐(오프라인) 또는 DEV면 → 게임 정상 동작(게이트 통과).
     * 게임 상태가 실시간으로 바뀌면 화면도 즉시 갱신.
     */
    let gameStateBound = false;
    function gateByGameState() {
      const sync = window.SchoolExplorerSync;
      const apply = () => {
        const s = window.SchoolExplorerSync;
        if (DEV || !s || !s.online) { route(); return; }   // 오프라인/DEV는 그냥 진행
        if (!gameStateBound) {
          gameStateBound = true;
          s.subscribeGameState((on) => {
            if (on) route();
            else showCampScreen();
          });
        }
      };
      if (window.SYNC_READY) apply();
      else window.addEventListener('sync-ready', apply, { once: true });
    }

    /* 게임 정지 중 안내 화면 (즐거운 아빠 캠핑) */
    function showCampScreen() {
      // 스캐너가 떠 있으면 닫기
      if (typeof stopCamera === 'function') stopCamera();
      const overlay = document.getElementById('scannerOverlay');
      if (overlay) overlay.classList.remove('active');
      document.getElementById('card').innerHTML = `
        <div class="camp-screen">
          <img src="images/Gemini_Generated_Image_hlj0behlj0behlj0.png" alt="즐거운 아빠 캠핑">
        </div>`;
    }

    function route() {
      if (DEV && (!PROGRESS || !PROGRESS.team)) {
        PROGRESS = startGame(COURSE, COURSE.teams[0]);
      }
      if (!PROGRESS || !PROGRESS.team) {
        guide('🚩', '먼저 조를 선택하세요', null,
          '시작 화면에서 우리 조를 먼저 골라야 미션을 시작할 수 있어요.',
          'home.html', '🏠 미션 홈으로');
        return;
      }
      if (!scannedQid) { showCurrentGuide(); return; }

      QUESTION = findQuestion(QUESTIONS, scannedQid);
      MISSION = missionByQuestionId(COURSE, scannedQid);
      if (!QUESTION || !MISSION) {
        guide('❓', '알 수 없는 QR이에요', null, '이 QR코드는 우리 탐험대 미션이 아니에요.',
          'home.html', '🏠 미션 홈으로');
        return;
      }

      const setNo = MISSION.set;
      if (DEV) { renderQuestion(); return; }

      if (PROGRESS.solved[setNo]) {
        guide('✅', '이미 해결한 미션이에요', null,
          `'${MISSION.placeName}' 미션은 이미 풀었어요. 다음 장소로 가요!`, null, null, true);
        return;
      }

      const cur = currentSet(PROGRESS);
      if (setNo !== cur) {
        const curM = missionBySet(COURSE, cur);
        guide('🚧', '아직 여기 차례가 아니에요!', curM.placeName,
          '우리 조는 정해진 순서대로 움직여요. 아래 장소로 먼저 가세요.',
          'mission.html', '현재 미션 보기');
        return;
      }

      renderQuestion();
    }

    /* ── 장소 안내 화면 (QR 스캔 버튼 포함) ── */
    function showCurrentGuide() {
      if (isAllDone(PROGRESS)) {
        location.href = isFinalePending(COURSE, PROGRESS) ? 'map.html' : 'done.html';
        return;
      }
      // URL에 ?q= 파라미터가 남아있으면 제거하고 scanDone 리셋
      // 안 하면 이전 스캔 상태가 남아 새 QR이 인식되지 않음
      if (location.search) {
        history.replaceState(null, '', 'mission.html');
      }
      scanDone = false;
      const m = missionBySet(COURSE, currentSet(PROGRESS));
      const n = missionQrCount(m);
      const actualDone = PROGRESS.order.filter(s => !!PROGRESS.solved[s]).length;
      const stepNo = Math.max(PROGRESS.step, actualDone) + 1;
      const total = PROGRESS.order.length;

      const scanMsg = n === 1
        ? '이곳의 QR코드를 스캔해서 문제를 푸세요!'
        : `이곳에서 QR코드 ${n}개 중 하나를 스캔해서 내 문제를 푸세요!`;

      document.getElementById('card').innerHTML = `
        <div class="guide">
          <div class="ico">📍</div>
          <div class="ttl">${stepNo}번째 미션 장소</div>
          <div class="place">
            <div class="lbl">📜 ${PROGRESS.team} · ${stepNo} / ${total}</div>
            <div class="nm">${m.placeName}</div>
          </div>
          <div class="desc">${scanMsg}</div>
          <button class="scan-guide-btn primary" id="scanBtn">📷 QR 스캔하기</button>
          <a class="guide btn" href="home.html">🗺️ 지도로 돌아가기</a>
        </div>`;

      document.getElementById('scanBtn').onclick = openScanner;
    }

    function renderQuestion() {
      const q = QUESTION;
      const n = missionQrCount(MISSION);
      const isCommon = n === 1;
      const total = PROGRESS.order.length;
      // 현재 미션이 몇 번째인지 order 배열에서 찾아 표시 (DEV모드/직접접근 모두 정확)
      const stepNo = PROGRESS.order.indexOf(MISSION.set) + 1 || PROGRESS.step + 1;
      hintsShown = 0;

      const myLabel = isCommon ? `${q.set}번 공통` : `${q.set}-${q.slot}`;
      const len = isCommon ? null : n;

      let noteHtml, inputLabel, placeholder;
      if (isCommon) {
        noteHtml = `
          <div class="pair-note">
            이 장소는 <b>공통 문제</b>예요. 조원 모두 같은 문제를 풉니다.<br>
            한 명이 먼저 풀면 <b>정답을 친구들에게 알려주세요!</b><br>
            각자 자기 폰에 정답을 입력하면 다음 장소로 갈 수 있어요.
          </div>`;
        inputLabel = '정답 입력';
        placeholder = '정답을 입력하세요';
      } else {
        const others = (MISSION.qids || []).filter(x => x !== q.id)
          .map(x => `${q.set}-${x.replace(String(q.set), '')}`).join(', ');
        noteHtml = `
          <div class="pair-note">
            🤝 <b>이 장소는 조원이 함께 푸는 협력 미션이에요!</b><br>
            각자 다른 QR을 찍어 문제를 풀고, 조원끼리 답을 알려주세요.<br>
            모든 답을 모아서 최종 정답을 완성한 뒤 입력하세요.<br>
            <span class="warn">⚠️ 내 답만 입력하는 게 아니에요!</span>
          </div>`;
        inputLabel = MISSION.inputGuide || `#1~#${len}번 문제의 답을 모아서 입력하세요`;
        placeholder = `조원 ${len}명의 답을 모아서 입력`;
      }

      const hasHints = q.hints && q.hints.length > 0;
      const mediaHtml = renderMediaHtml(questionMedia(q));

      // 내 답 메모 (협력 미션 전용) — 저장해둔 값 미리 채움
      const myNote = getNote(PROGRESS, q.id);
      const noteBoxHtml = isCommon ? '' : `
        <div class="note-box">
          <div class="note-label">✏️ 이 문제 내 답 (메모)
            <small>친구에게 알려줄 내 답을 적어두세요. 다시 이 QR을 찍으면 그대로 보여요.</small>
          </div>
          <input class="note-input" id="note" placeholder="예: 커비" autocomplete="off" value="${myNote.replace(/"/g, '&quot;')}">
          <div class="note-saved" id="noteSaved"></div>
        </div>`;

      document.getElementById('card').innerHTML = `
        <div class="topbar">
          <span class="team">📜 ${PROGRESS.team}${DEV ? '<span class="dev-badge">🛠️ DEV</span>' : ''}</span>
          <span class="step">미션 ${stepNo} / ${total}</span>
        </div>
        ${!isCommon ? `<button class="qr-btn" onclick="showCurrentGuide()">📷 다른 QR 찍기</button>` : ''}
        <div class="badge-row">
          <span class="badge badge-pair">${isCommon ? '공통 문제' : `#${MISSION.qids.indexOf(q.id) + 1}번 문제`} / ${MISSION.placeName}${isCommon ? '' : ` (총 ${n}문제)`}</span>
        </div>
        ${mediaHtml}
        <p class="question-text">${q.question}</p>
        ${noteHtml}
        ${hasHints ? (q.hints.map((_, i) => `<button class="hint-btn" data-hint="${i}">💡 힌트 ${i+1}</button>`).join('')) : ''}
        ${noteBoxHtml}
        <div class="combined-label">${inputLabel}</div>
        <input class="answer-input" id="ans" placeholder="${placeholder}" autocomplete="off">
        <button class="submit-btn" id="submitBtn">✅ 정답 제출</button>
        <div class="feedback" id="feedback"></div>
        ${DEV ? '<a class="back-link" href="dev.html" style="display:block">← 개발자 콘솔로</a>' : ''}
      `;

      if (hasHints) {
        document.querySelectorAll('.hint-btn').forEach(btn => {
          btn.onclick = () => {
            const idx = parseInt(btn.dataset.hint);
            document.getElementById('hintPopupItems').innerHTML =
              `<div class="hint-popup-item">💡 ${q.hints[idx]}</div>`;
            document.getElementById('hintOverlay').classList.add('active');
          };
        });
      }

      // 메모 입력 → 즉시 저장 (채점 무관, 기억 보조)
      const noteEl = document.getElementById('note');
      if (noteEl) {
        noteEl.addEventListener('input', () => {
          saveNote(PROGRESS, q.id, noteEl.value);
          const savedEl = document.getElementById('noteSaved');
          if (savedEl) {
            savedEl.textContent = noteEl.value.trim() ? '✓ 저장됨' : '';
          }
        });
      }

      document.getElementById('submitBtn').onclick = () => {
        const input = document.getElementById('ans').value || '';
        const fb = document.getElementById('feedback');
        if (!input.trim()) { fb.className = 'feedback wrong'; fb.textContent = '정답을 입력해주세요!'; return; }
        if (checkCombined(q, input)) {
          markSolved(PROGRESS, q.set, input.trim());
          reportProgress(COURSE, PROGRESS);
          fb.className = 'feedback right';
          fb.textContent = isCommon ? '🎉 정답이에요! 멋져요!' : '🎉 정답이에요! 모두 힘을 합쳤네요!';
          setTimeout(() => showNextAfterSolve(q.combined, isCommon), 800);
        } else {
          fb.className = 'feedback wrong';
          fb.textContent = isCommon ? '아쉬워요! 다시 생각해 볼까요?' : '아쉬워요! 친구들과 답을 다시 맞춰보세요.';
        }
      };

      if (DEV) {
        document.querySelector('.back-link').onclick = () => location.href = 'dev.html';
      }
    }

    function showNextAfterSolve(solvedAnswer, wasCommon) {
      const allDone = isAllDone(PROGRESS);
      const stepNo = PROGRESS.step + 1, total = PROGRESS.order.length;

      const shareHtml = `
        <div class="share-box">
          <div class="share-lbl">✅ 우리 조 정답 (친구에게 알려주세요!)</div>
          <div class="share-ans">${solvedAnswer}</div>
        </div>`;

      const piece = MISSION && MISSION.piece;
      const got = collectedPieces(COURSE, PROGRESS).length;
      const need = totalPieces(COURSE);
      const pieceHtml = piece ? `
        <div class="piece-box">
          <div class="piece-lbl">🔑 보물 글자 획득! (${got}/${need})</div>
          <div class="piece-char">${piece}</div>
        </div>` : '';

      if (allDone) {
        document.getElementById('card').innerHTML = `
          <div class="guide">
            <div class="ico">🧩</div>
            <div class="ttl">모든 미션 완료!</div>
            ${shareHtml}
            ${pieceHtml}
            <div class="desc">이제 모은 글자 ${need}개를 조합해 보물이 숨은 곳을 찾을 차례예요!</div>
            <a class="guide btn" href="map.html">🔑 보물 글자 조합하러 가기 →</a>
            ${DEV ? '<a class="guide btn" href="dev.html">🛠️ 개발자 패널로</a>' : ''}
          </div>`;
        return;
      }

      const m = missionBySet(COURSE, currentSet(PROGRESS));
      const n = missionQrCount(m);
      const placeHtml = `<div class="place"><div class="lbl">다음 장소</div><div class="nm">${m.placeName}</div></div>`;
      const scanMsg = n === 1
        ? `${stepNo}/${total} · 이 장소의 QR을 스캔해 공통 문제를 푸세요!`
        : `${stepNo}/${total} · 이 장소에서 QR ${n}개를 ${n}명이 나눠 스캔!`;

      document.getElementById('card').innerHTML = `
        <div class="guide">
          <div class="ico">✅</div>
          <div class="ttl">정답! 다음 미션으로 출발!</div>
          ${shareHtml}
          ${pieceHtml}
          ${placeHtml}
          <div class="desc">${scanMsg}</div>
          <a class="guide btn" href="map.html">🔑 보물 글자 모음 보기</a>
          ${DEV ? '<a class="guide btn" href="dev.html">🛠️ 개발자 패널로</a>' : ''}
          <a class="guide btn" href="home.html">🏠 미션 홈으로</a>
          <div class="redirect-bar">🗺️ <span id="redirectCount">3</span>초 후 지도로 이동합니다</div>
        </div>`;

      // 3초 카운트다운 후 home.html로 자동 이동
      let count = 3;
      const timer = setInterval(() => {
        count--;
        const el = document.getElementById('redirectCount');
        if (el) el.textContent = count;
        if (count <= 0) {
          clearInterval(timer);
          location.href = 'home.html';
        }
      }, 1000);
    }

    // 힌트 팝업 닫기 — 닫기 버튼 or 오버레이 클릭
    document.getElementById('hintPopupClose').onclick = closeHintPopup;
    document.getElementById('hintOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('hintOverlay')) closeHintPopup();
    });
    function closeHintPopup() {
      document.getElementById('hintOverlay').classList.remove('active');
    }

    function guide(ico, ttl, placeName, desc, link, linkLabel, showHome) {
      const placeHtml = placeName ? `<div class="place"><div class="lbl">다음 장소</div><div class="nm">${placeName}</div></div>` : '';
      const linkHtml = link ? `<a class="guide btn" href="${link}">${linkLabel}</a>` : '';
      const homeHtml = showHome ? `<a class="guide btn" href="home.html">🏠 미션 홈으로</a>` : '';
      document.getElementById('card').innerHTML =
        `<div class="guide"><div class="ico">${ico}</div><div class="ttl">${ttl}</div>${placeHtml}<div class="desc">${desc}</div>${linkHtml}${homeHtml}</div>`;
    }

    /* ── QR 스캐너 ── */
    function openScanner() {
      scanDone = false;
      document.getElementById('scannerOverlay').classList.add('active');
      startCamera();
    }
    function closeScanner() {
      stopCamera();
      document.getElementById('scannerOverlay').classList.remove('active');
      document.getElementById('scannerMsg').textContent = 'QR코드를 화면 안에 맞춰주세요';
    }
    document.getElementById('scannerCancel').onclick = closeScanner;

    async function startCamera() {
      try {
        scanStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } }
        });
        const video = document.getElementById('qr-video');
        video.srcObject = scanStream;
        video.onloadedmetadata = () => { video.play(); requestAnimationFrame(scanTick); };
      } catch {
        document.getElementById('scannerMsg').textContent = '카메라 권한이 필요해요. 브라우저 설정에서 허용해주세요.';
      }
    }
    function stopCamera() {
      if (scanRAF) { cancelAnimationFrame(scanRAF); scanRAF = null; }
      if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
      document.getElementById('qr-video').srcObject = null;
    }
    function scanTick() {
      if (scanDone) return;
      const video = document.getElementById('qr-video');
      const canvas = document.getElementById('qr-canvas');
      if (video.readyState !== video.HAVE_ENOUGH_DATA) { scanRAF = requestAnimationFrame(scanTick); return; }
      const size = Math.min(video.videoWidth, video.videoHeight);
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const ox = (video.videoWidth - size) / 2, oy = (video.videoHeight - size) / 2;
      ctx.drawImage(video, ox, oy, size, size, 0, 0, size, size);
      const imageData = ctx.getImageData(0, 0, size, size);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
      if (code) { handleQrResult(code.data); } else { scanRAF = requestAnimationFrame(scanTick); }
    }
    function handleQrResult(url) {
      scanDone = true;
      closeScanner();
      try {
        let qid = null;
        if (url.includes('mission.html')) {
          qid = new URL(url, location.href).searchParams.get('q');
        } else if (/^[0-9]+[A-Z]?$/i.test(url.trim())) {
          qid = url.trim().toUpperCase();
        }
        if (qid) {
          location.href = `mission.html?q=${encodeURIComponent(qid)}`;
        } else {
          alert('이 QR코드는 우리 탐험대 미션이 아니에요 🙅');
        }
      } catch {
        alert('QR코드를 읽을 수 없어요. 다시 시도해주세요.');
      }
    }
  </script>
