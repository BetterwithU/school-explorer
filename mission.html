<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미션</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #060d0a;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 손전등 비추는 효과 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 45%, transparent 0%, rgba(0,0,0,0.7) 60%, rgba(0,0,0,0.92) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* 초록 스캔라인 효과 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,255,100,0.015) 3px,
        rgba(0,255,100,0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(8,20,14,0.88);
      border: 1px solid #1a4a2e;
      border-radius: 20px;
      padding: 24px 20px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 40px rgba(0,255,100,0.06), 0 8px 40px rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      padding-bottom: 12px;
      border-bottom: 1px solid #1a4a2e;
    }
    .topbar .team { color: #39ff8f; font-weight: bold; text-shadow: 0 0 8px rgba(57,255,143,0.5); }
    .topbar .step { color: #7a9a8a; }
    .dev-badge { background: #7c3aed; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }

    .badge-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: bold; border: 1px solid transparent; }
    .badge-pair { background: rgba(233,69,96,0.2); color: #ff6b7a; border-color: #e94560; }
    .badge-place { background: rgba(57,255,143,0.1); color: #39ff8f; border-color: #1a6a40; }
    .badge-cat { background: rgba(255,209,102,0.1); color: #ffd166; border-color: #7a6020; }

    .question-text {
      font-size: 1.22rem;
      line-height: 1.75;
      margin-bottom: 18px;
      white-space: pre-line;
      color: #e8f5ee;
    }

    .q-media { margin-bottom: 16px; }
    .q-image { width: 100%; border-radius: 12px; display: block; border: 1px solid #1a4a2e; }
    .q-video { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; background: #000; }
    .q-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .q-audio { width: 100%; display: block; }

    .pair-note {
      background: rgba(57,255,143,0.06);
      border-left: 3px solid #39ff8f;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      color: #a8e6b8;
      line-height: 1.6;
    }
    .pair-note b { color: #ffd166; }

    .hint-btn {
      background: none;
      border: 1px solid #1a4a2e;
      color: #7a9a8a;
      padding: 11px;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background 0.2s, color 0.2s;
    }
    .hint-btn:active { background: rgba(57,255,143,0.08); color: #39ff8f; }
    @media (hover: hover) { .hint-btn:hover { background: rgba(57,255,143,0.08); color: #39ff8f; } }

    .hint-box {
      background: rgba(57,255,143,0.06);
      border: 1px solid #1a4a2e;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      color: #a8e6b8;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .my-answer-label { font-size: 0.85rem; color: #74c69d; margin: 14px 0 6px; }
    .combined-label { font-size: 0.88rem; color: #ffd166; margin: 8px 0 6px; font-weight: bold; letter-spacing: 0.5px; }

    .answer-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #1a6a40;
      background: rgba(57,255,143,0.06);
      color: #39ff8f;
      font-size: 1.2rem;
      margin-bottom: 16px;
      text-align: center;
      caret-color: #39ff8f;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .answer-input:focus {
      outline: none;
      border-color: #39ff8f;
      box-shadow: 0 0 12px rgba(57,255,143,0.2);
    }
    .answer-input::placeholder { color: #3a6a4a; font-size: 0.95rem; }

    .submit-btn {
      background: linear-gradient(135deg, #39ff8f 0%, #20d97a 100%);
      border: none;
      color: #060d0a;
      padding: 15px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(57,255,143,0.3);
    }
    .submit-btn:active { transform: scale(0.97); }
    @media (hover: hover) { .submit-btn:hover { box-shadow: 0 6px 20px rgba(57,255,143,0.4); } }

    .feedback { margin-top: 14px; padding: 14px; border-radius: 12px; text-align: center; font-size: 1rem; display: none; }
    .feedback.wrong { background: rgba(233,69,96,0.15); border: 1px solid #e94560; color: #ff9aaa; display: block; }
    .feedback.right { background: rgba(57,255,143,0.12); border: 1px solid #39ff8f; color: #39ff8f; display: block; }

    /* 안내 화면 */
    .guide { text-align: center; }
    .guide .ico { font-size: 2.6rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(57,255,143,0.4)); }
    .guide .ttl { font-size: 1.15rem; font-weight: bold; margin-bottom: 12px; color: #39ff8f; text-shadow: 0 0 10px rgba(57,255,143,0.4); }
    .guide .place {
      background: rgba(57,255,143,0.08);
      border: 1px solid #1a6a40;
      border-radius: 14px;
      padding: 18px;
      margin: 14px 0;
    }
    .guide .place .lbl { font-size: 0.78rem; color: #74c69d; letter-spacing: 1px; }
    .guide .place .nm { font-size: 1.5rem; font-weight: bold; color: #39ff8f; margin-top: 4px; text-shadow: 0 0 8px rgba(57,255,143,0.3); }

    .share-box {
      background: rgba(255,209,102,0.1);
      border: 1px solid #7a6020;
      border-radius: 14px;
      padding: 16px;
      margin: 8px 0 4px;
    }
    .share-box .share-lbl { font-size: 0.8rem; color: #ffd166; margin-bottom: 6px; letter-spacing: 0.5px; }
    .share-box .share-ans { font-size: 1.8rem; font-weight: bold; color: #fff; letter-spacing: 3px; text-shadow: 0 0 8px rgba(255,209,102,0.3); }

    .piece-box {
      background: rgba(57,255,143,0.06);
      border: 1px solid #1a6a40;
      border-radius: 14px;
      padding: 16px;
      margin: 8px 0;
    }
    .piece-box .piece-lbl { font-size: 0.8rem; color: #74c69d; margin-bottom: 6px; }
    .piece-box .piece-char { font-size: 2.6rem; font-weight: bold; color: #ffd166; text-shadow: 0 0 12px rgba(255,209,102,0.5); }

    .guide .desc { color: #7a9a8a; font-size: 0.9rem; line-height: 1.7; white-space: pre-line; }
    .guide .btn {
      display: block;
      background: rgba(57,255,143,0.1);
      border: 1px solid #1a6a40;
      color: #39ff8f;
      text-decoration: none;
      padding: 13px;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .guide .btn:active { background: rgba(57,255,143,0.18); }
    @media (hover: hover) { .guide .btn:hover { background: rgba(57,255,143,0.18); } }

    .back-link {
      display: block;
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 14px;
      color: #3a6a4a;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 8px;
    }
    .back-link:active { color: #74c69d; }
    @media (hover: hover) { .back-link:hover { color: #74c69d; } }
  </style>
</head>
<body>
  <div class="card" id="card"><p style="text-align:center;color:#39ff8f;opacity:0.6">불러오는 중...</p></div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script type="module" src="sync.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const scannedQid = params.get('q');
    const DEV = params.get('dev') === '1';

    let COURSE, QUESTIONS, PROGRESS, QUESTION, MISSION;
    let hintsShown = 0;

    loadData().then(({ course, questions }) => {
      COURSE = course; QUESTIONS = questions;
      PROGRESS = loadProgress();
      route();
      reportProgress(COURSE, PROGRESS);
    });

    function route() {
      if (DEV && (!PROGRESS || !PROGRESS.team)) {
        PROGRESS = startGame(COURSE, COURSE.teams[0]);
      }
      if (!PROGRESS || !PROGRESS.team) {
        guide('🚩', '먼저 조를 선택하세요', null,
          '시작 화면에서 우리 조를 먼저 골라야 미션을 시작할 수 있어요.',
          'home.html', '🏠 미션 홈으로');
        return;
      }
      if (!scannedQid) { showCurrentGuide(); return; }

      QUESTION = findQuestion(QUESTIONS, scannedQid);
      MISSION = missionByQuestionId(COURSE, scannedQid);
      if (!QUESTION || !MISSION) {
        guide('❓', '알 수 없는 QR이에요', null, '이 QR코드는 우리 탐험대 미션이 아니에요.',
          'home.html', '🏠 미션 홈으로');
        return;
      }

      const setNo = MISSION.set;

      if (DEV) { renderQuestion(); return; }

      if (PROGRESS.solved[setNo]) {
        guide('✅', '이미 해결한 미션이에요', null,
          `'${MISSION.placeName}' 미션은 이미 풀었어요. 다음 장소로 가요!`, null, null, true);
        return;
      }

      const cur = currentSet(PROGRESS);
      if (setNo !== cur) {
        const curM = missionBySet(COURSE, cur);
        guide('🚧', '아직 여기 차례가 아니에요!', curM.placeName,
          '우리 조는 정해진 순서대로 움직여요. 아래 장소로 먼저 가세요.',
          `mission.html`, '현재 미션 보기');
        return;
      }

      renderQuestion();
    }

    function showCurrentGuide() {
      if (isAllDone(PROGRESS)) {
        location.href = isFinalePending(COURSE, PROGRESS) ? 'map.html' : 'done.html';
        return;
      }
      const m = missionBySet(COURSE, currentSet(PROGRESS));
      const n = missionQrCount(m);
      const stepNo = PROGRESS.step + 1, total = PROGRESS.order.length;
      const scanMsg = n === 1
        ? '이곳의 QR코드를 모두 스캔해서 공통 문제를 푸세요!'
        : `이곳에서 QR코드 ${n}개를 ${n}명이 나눠 스캔하세요!`;
      guide('📍', `${stepNo}번째 미션 장소`, m.placeName,
        `${PROGRESS.team} · ${stepNo}/${total}\n${scanMsg}`, null, null, true);
    }

    function renderQuestion() {
      const q = QUESTION;
      const n = missionQrCount(MISSION);
      const isCommon = n === 1;
      const stepNo = PROGRESS.step + 1, total = PROGRESS.order.length;
      hintsShown = 0;

      const myLabel = isCommon ? `${q.set}번 공통` : `${q.set}-${q.slot}`;
      const len = isCommon ? null : n;

      let noteHtml, inputLabel, placeholder;
      if (isCommon) {
        noteHtml = `
          <div class="pair-note">
            이 장소는 <b>공통 문제</b>예요. 조원 모두 같은 문제를 풉니다.<br>
            한 명이 먼저 풀면 <b>정답을 친구들에게 알려주세요!</b><br>
            각자 자기 폰에 정답을 입력하면 다음 장소로 갈 수 있어요.
          </div>`;
        inputLabel = '정답 입력';
        placeholder = '정답을 입력하세요';
      } else {
        const others = (MISSION.qids || []).filter(x => x !== q.id)
          .map(x => `${q.set}-${x.replace(String(q.set), '')}`).join(', ');
        noteHtml = `
          <div class="pair-note">
            이 문제의 답은 <b>한 글자</b>예요.<br>
            짝꿍 <b>${others}</b> 친구들의 답과 <b>순서대로 합쳐야</b> ${len}글자가 완성돼요.<br>
            서로 답을 알려주고, 아래에 <b>${len}글자 전체</b>를 입력하세요!
          </div>`;
        inputLabel = `${len}글자 정답 입력`;
        placeholder = `${len}글자 모두 입력`;
      }

      const hintsHtml = (q.hints || []).map((h, i) =>
        `<div class="hint-box" id="hint${i}" style="display:none">💡 ${h}</div>`
      ).join('');

      const mediaHtml = renderMediaHtml(questionMedia(q));

      document.getElementById('card').innerHTML = `
        <div class="topbar">
          <span class="team">🔦 ${PROGRESS.team}${DEV ? '<span class="dev-badge">🛠️ DEV</span>' : ''}</span>
          <span class="step">미션 ${stepNo} / ${total}</span>
        </div>
        <div class="badge-row">
          <span class="badge badge-pair">${myLabel}</span>
          <span class="badge badge-place">${MISSION.placeName}</span>
          <span class="badge badge-cat">${q.category}</span>
        </div>
        ${mediaHtml}
        <p class="question-text">${q.question}</p>
        ${noteHtml}
        ${hintsHtml}
        <button class="hint-btn" id="hintBtn">💡 힌트 보기${q.hints && q.hints.length ? ' (' + q.hints.length + ')' : ''}</button>
        <div class="combined-label">${inputLabel}</div>
        <input class="answer-input" id="ans" placeholder="${placeholder}" autocomplete="off">
        <button class="submit-btn" id="submitBtn">✅ 정답 제출</button>
        <div class="feedback" id="feedback"></div>
        <a class="back-link" href="${DEV ? 'dev.html' : 'mission.html'}">${DEV ? '← 개발자 콘솔로' : '← 뒤로 (이 문제 접고 다른 QR 찍기)'}</a>
      `;

      document.getElementById('hintBtn').onclick = () => {
        const hints = q.hints || [];
        if (hintsShown < hints.length) { document.getElementById('hint' + hintsShown).style.display = 'block'; hintsShown++; }
        if (hintsShown >= hints.length) document.getElementById('hintBtn').style.display = 'none';
      };

      document.getElementById('submitBtn').onclick = () => {
        const input = document.getElementById('ans').value || '';
        const fb = document.getElementById('feedback');
        if (!input.trim()) { fb.className = 'feedback wrong'; fb.textContent = '정답을 입력해주세요!'; return; }
        if (checkCombined(q, input)) {
          markSolved(PROGRESS, q.set, input.trim());
          reportProgress(COURSE, PROGRESS);
          fb.className = 'feedback right';
          fb.textContent = isCommon ? '🎉 정답이에요! 멋져요!' : '🎉 정답이에요! 모두 힘을 합쳤네요!';
          setTimeout(() => showNextAfterSolve(q.combined, isCommon), 800);
        } else {
          fb.className = 'feedback wrong';
          fb.textContent = isCommon ? '아쉬워요! 다시 생각해 볼까요?' : '아쉬워요! 친구들과 답을 다시 맞춰보세요.';
        }
      };
    }

    function showNextAfterSolve(solvedAnswer, wasCommon) {
      const allDone = isAllDone(PROGRESS);
      const stepNo = PROGRESS.step + 1, total = PROGRESS.order.length;

      const shareHtml = `
        <div class="share-box">
          <div class="share-lbl">✅ 우리 조 정답 (친구에게 알려주세요!)</div>
          <div class="share-ans">${solvedAnswer}</div>
        </div>`;

      const piece = MISSION && MISSION.piece;
      const got = collectedPieces(COURSE, PROGRESS).length;
      const need = totalPieces(COURSE);
      const pieceHtml = piece ? `
        <div class="piece-box">
          <div class="piece-lbl">🔑 보물 글자 획득! (${got}/${need})</div>
          <div class="piece-char">${piece}</div>
        </div>` : '';

      if (allDone) {
        document.getElementById('card').innerHTML = `
          <div class="guide">
            <div class="ico">🧩</div>
            <div class="ttl">모든 미션 완료!</div>
            ${shareHtml}
            ${pieceHtml}
            <div class="desc">이제 모은 글자 ${need}개를 조합해 보물이 숨은 곳을 찾을 차례예요!</div>
            <a class="btn" href="map.html">🔑 보물 글자 조합하러 가기 →</a>
            ${DEV ? '<a class="btn" href="dev.html">🛠️ 개발자 패널로</a>' : ''}
          </div>`;
        return;
      }

      const m = missionBySet(COURSE, currentSet(PROGRESS));
      const n = missionQrCount(m);
      const placeHtml = `<div class="place"><div class="lbl">다음 장소</div><div class="nm">${m.placeName}</div></div>`;
      const scanMsg = n === 1
        ? `${stepNo}/${total} · 이 장소의 QR을 스캔해 공통 문제를 푸세요!`
        : `${stepNo}/${total} · 이 장소에서 QR ${n}개를 ${n}명이 나눠 스캔!`;

      document.getElementById('card').innerHTML = `
        <div class="guide">
          <div class="ico">✅</div>
          <div class="ttl">정답! 다음 미션으로 출발!</div>
          ${shareHtml}
          ${pieceHtml}
          ${placeHtml}
          <div class="desc">${scanMsg}</div>
          <a class="btn" href="map.html">🔑 보물 글자 모음 보기</a>
          ${DEV ? '<a class="btn" href="dev.html">🛠️ 개발자 패널로</a>' : ''}
          <a class="btn" href="home.html">🏠 미션 홈으로</a>
        </div>`;
    }

    function guide(ico, ttl, placeName, desc, link, linkLabel, showHome) {
      const placeHtml = placeName ? `<div class="place"><div class="lbl">다음 장소</div><div class="nm">${placeName}</div></div>` : '';
      const linkHtml = link ? `<a class="btn" href="${link}">${linkLabel}</a>` : '';
      const homeHtml = showHome ? `<a class="btn" href="home.html">🏠 미션 홈으로</a>` : '';
      document.getElementById('card').innerHTML =
        `<div class="guide"><div class="ico">${ico}</div><div class="ttl">${ttl}</div>${placeHtml}<div class="desc">${desc}</div>${linkHtml}${homeHtml}</div>`;
    }
  </script>
</body>
</html>
