name: Notion → 사이트 반영

# 수동 트리거만 (Actions 탭에서 Run workflow). 정기 동기화 원하면 아래 schedule 주석 해제.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Notion → JSON 변환
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          QUESTIONS_DB_ID: ${{ secrets.QUESTIONS_DB_ID }}
          COURSE_DB_ID: ${{ secrets.COURSE_DB_ID }}
        run: node tools/notion-to-json.mjs

      - name: 변경 커밋·푸시
        run: |
          git config user.name "notion-sync[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add questions.json course.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "Notion 동기화: 문제·코스 갱신"
            git push
          fi
