<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문제</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #16213e;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .badge-num { background: #0f3460; color: #e94560; }
    .badge-cat { background: #0f3460; color: #a8dadc; }
    .badge-easy { background: #2d6a4f; color: #b7e4c7; }
    .badge-medium { background: #7b4f12; color: #ffd166; }
    .badge-hard { background: #6b1c2e; color: #ffb3c1; }

    .question-text {
      font-size: 1.3rem;
      line-height: 1.7;
      margin-bottom: 24px;
      white-space: pre-line;
    }

    .media-wrap {
      margin-bottom: 24px;
      border-radius: 12px;
      overflow: hidden;
    }

    .media-wrap img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .media-wrap video {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .hint-btn {
      background: none;
      border: 2px solid #0f3460;
      color: #a8dadc;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
      transition: background 0.2s;
    }

    .hint-btn:hover { background: #0f3460; }

    .hint-box {
      background: #0f3460;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      color: #a8dadc;
      font-size: 0.95rem;
      display: none;
    }

    .answer-btn {
      background: #e94560;
      border: none;
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .answer-btn:hover { background: #c73652; }

    .answer-box {
      background: #2d6a4f;
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
      color: #b7e4c7;
      font-size: 1rem;
      line-height: 1.6;
      display: none;
      white-space: pre-line;
    }

    .answer-label {
      font-size: 0.8rem;
      color: #74c69d;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .not-found {
      text-align: center;
      color: #e94560;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <p class="not-found">문제를 불러오는 중...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));

    fetch('questions.json')
      .then(r => r.json())
      .then(questions => {
        const q = questions.find(q => q.id === id);
        const card = document.getElementById('card');

        if (!q) {
          card.innerHTML = '<p class="not-found">문제를 찾을 수 없습니다.</p>';
          return;
        }

        const diffClass = { easy: 'badge-easy', medium: 'badge-medium', hard: 'badge-hard' }[q.difficulty] || 'badge-easy';
        const diffLabel = { easy: '쉬움', medium: '보통', hard: '어려움' }[q.difficulty] || '';

        let mediaHtml = '';
        if (q.type === 'image' && q.media) {
          mediaHtml = `<div class="media-wrap"><img src="${q.media}" alt="문제 이미지"></div>`;
        } else if (q.type === 'video' && q.media) {
          mediaHtml = `<div class="media-wrap"><video controls><source src="${q.media}"></video></div>`;
        }

        card.innerHTML = `
          <div class="badge-row">
            <span class="badge badge-num">문제 ${q.id}</span>
            <span class="badge badge-cat">${q.category}</span>
            <span class="badge ${diffClass}">${diffLabel}</span>
          </div>
          ${mediaHtml}
          <p class="question-text">${q.question}</p>
          <button class="hint-btn" onclick="toggleHint()">💡 힌트 보기</button>
          <div class="hint-box" id="hint">${q.hint}</div>
          <button class="answer-btn" onclick="toggleAnswer()">정답 확인</button>
          <div class="answer-box" id="answer">
            <div class="answer-label">정답</div>
            ${q.answer}
          </div>
        `;
      })
      .catch(() => {
        document.getElementById('card').innerHTML = '<p class="not-found">문제를 불러올 수 없습니다.</p>';
      });

    function toggleHint() {
      const h = document.getElementById('hint');
      h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    function toggleAnswer() {
      const a = document.getElementById('answer');
      a.style.display = a.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
